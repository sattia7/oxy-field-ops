ve models analyze vibration, temperature, and pressure trends to flag failures days or weeks ahead.",explainAR:"النماذج التنبؤية تحلل الاهتزاز ودرجة الحرارة واتجاهات الضغط للكشف عن الأعطال قبل أيام أو أسابيع."},{text:"AI systems are 100% accurate and never make mistakes.",textAR:"أنظمة الذكاء الاصطناعي دقيقة بنسبة 100% ولا تخطئ أبداً.",answer:!1,explain:"AI makes mistakes—bad data, edge cases, and bias can all cause errors. Always verify critical outputs.",explainAR:"الذكاء الاصطناعي يخطئ — البيانات السيئة والحالات النادرة والتحيز يمكن أن تسبب أخطاء. تحقق دائماً من المخرجات الحرجة."},{text:"You need to be a programmer to use AI in the field.",textAR:"تحتاج أن تكون مبرمجاً لاستخدام الذكاء الاصطناعي في الميدان.",answer:!1,explain:"Modern field AI is built for operators. If you can use a smartphone, you can use field AI tools.",explainAR:"الذكاء الاصطناعي الميداني الحديث مصمم للمشغلين. إذا كنت تستطيع استخدام الهاتف الذكي، يمكنك استخدام أدوات الذكاء الاصطناعي الميدانية."},{text:"AI can inspect pipelines using drones and cameras.",textAR:"يمكن للذكاء الاصطناعي فحص خطوط الأنابيب باستخدام الطائرات بدون طيار والكاميرات.",answer:!0,explain:"Computer vision models detect corrosion, leaks, and anomalies from drone and CCTV footage automatically.",explainAR:"نماذج الرؤية الحاسوبية تكتشف التآكل والتسريبات والشذوذ من لقطات الطائرات بدون طيار وكاميرات المراقبة تلقائياً."},{text:"AI does not need human supervision in safety-critical jobs.",textAR:"الذكاء الاصطناعي لا يحتاج إلى إشراف بشري في المهام الحرجة للسلامة.",answer:!1,explain:"In safety-critical work, AI assists humans. Final decisions and accountability stay with the engineer.",explainAR:"في الأعمال الحرجة للسلامة، يساعد الذكاء الاصطناعي البشر. القرارات النهائية والمساءلة تبقى مع المهندس."},{text:"AI can work with any data, even if it is incomplete or wrong.",textAR:"يمكن للذكاء الاصطناعي تحسين جداول الصيانة لتوفير التكاليف.",answer:!1,answerAR:!0,explain:"AI needs quality data. Garbage in, garbage out. Missing sensors, bad calibration, and typos all reduce accuracy.",explainAR:"الصيانة التنبؤية المدعومة بالذكاء الاصطناعي تقلل من وقت التوقف غير المخطط له بنسبة تصل إلى 30% وتطيل عمر المعدات."},{text:"Digital twins let you test scenarios on a virtual copy of real equipment.",textAR:"الذكاء الاصطناعي يفهم السياق مثل الإنسان.",answer:!0,answerAR:!1,explain:"A digital twin is a virtual model of physical assets. You can simulate startups, shutdowns, and failures safely.",explainAR:"الذكاء الاصطناعي يفتقر إلى الفهم الحقيقي. يعالج الأنماط والإحصائيات لكنه لا يفهم حقاً 'لماذا' كما يفعل المهندس ذو الخبرة."}],SAFETY_SCENARIOS=[{text:"AI detects a gas leak anomaly and automatically shuts down the zone without alerting the operator first.",answer:!1,explain:"Critical shutdowns must always notify the operator and follow emergency protocols. Blind auto-shutdown is dangerous.",explainAR:"غير آمن! تجاوز حدود الاهتزاز مع عذر 'نجا من قبل' هو كيف تحدث الأعطال. حدود السلامة موجودة لسبب.",scenario:"يقترح الذكاء الاصطناعي تأخير إيقاف الضاغط على الرغم من تجاوز حد الاهتزاز. يقول النموذج إنه نجا من هذا المستوى من قبل. أنت المشرف.",safe:!1},{text:"An AI model flags a pump bearing temperature trend as abnormal 3 days before alarm limits.",answer:!0,explain:"Early warning gives time for planned maintenance—this is exactly how predictive AI should work.",explainAR:"آمن! استخدام تنبيه الذكاء الاصطناعي للتصرف بشكل استباقي بدلاً من رد الفعل هو بالضبط كيف يجب أن يعمل.",scenario:"توصي أداة مدعومة بالذكاء الاصطناعي بفحص بالموجات فوق الصوتية على مضخة ذات اهتزاز متزايد. أنت توافق وتجدوله للوردية التالية بدلاً من الانتظار.",safe:!0},{text:"A field engineer follows an AI-generated maintenance step without checking it against the official procedure.",answer:!1,explain:"Always cross-check AI suggestions with verified procedures. AI can hallucinate steps or miss site-specific hazards.",explainAR:"غير آمن! تجاوز أنظمة التعشيق لتوفير الوقت هو خطير للغاية. السلامة > الجدول.",scenario:"يقترح الذكاء الاصطناعي تجاوز نظام التعشيق أثناء بدء التشغيل لتوفير 15 دقيقة. أنت توافق لأنك متأخر عن الجدول.",safe:!1},{text:"AI monitors PPE compliance via CCTV and alerts the safety officer when a hard hat is missing.",answer:!0,explain:"Vision AI for PPE detection is a proven safety tool. It augments the safety officer, it does not replace them.",explainAR:"آمن! استخدام بيانات الذكاء الاصطناعي كمحفز للتحقق البشري هو البروتوكول الصحيح.",scenario:"تظهر لوحة معلومات الذكاء الاصطناعي أن معدل التآكل أعلى بنسبة 3% من المتوقع. تقوم بجدولة فحص بصري لتأكيد ذلك قبل اتخاذ أي إجراء.",safe:!0},{text:"A crew uses an AI chatbot to interpret a lockout/tagout procedure in Arabic without verifying the translation.",answer:!1,explain:"AI translations can miss technical nuance. Always verify safety-critical text with a qualified person.",explainAR:"غير آمن! التنبؤات لها فترات ثقة. الانتظار حتى آخر يومين يخاطر بفشل مبكر غير متوقع وعواقب خطيرة.",scenario:"يتنبأ نموذج الصيانة التنبؤية بفشل خلال 30 يوماً. تنتظر 28 يوماً قبل جدولة الإصلاح لتوفير وقت الإنتاج.",safe:!1}],CAPABILITIES=[{id:"see",icon:"fa-eye",color:"text-sky-400",title:"SEE",titleAR:"يرى",desc:"AI uses cameras, drones, and sensors to detect what human eyes might miss.",descAR:"يستخدم الذكاء الاصطناعي الكاميرات والطائرات بدون طيار وأجهزة الاستشعار لاكتشاف ما قد تفوته العيون البشرية.",examples:[{title:"Drone Pipeline Survey",detail:"AI reviews drone imagery to spot corrosion, coating damage, and vegetation encroachment across 50 km of pipeline in hours instead of weeks."},{title:"CCTV PPE Compliance",detail:"Real-time video analytics detect missing hard hats, safety glasses, or gloves and alert the control room instantly."}],examplesAR:[{title:"مسح خط الأنابيب بالطائرة بدون طيار",detail:"يراجع الذكاء الاصطناعي صور الطائرات بدون طيار للكشف عن التآكل وتلف الطلاء والتعدي على النباتات عبر 50 كم من خط الأنابيب في ساعات بدلاً من أسابيع."},{title:"الامتثال لمعدات الحماية الشخصية بالكاميرات",detail:"تحليل الفيديو في الوقت الفعلي يكتشف غياب الخوذات أو نظارات السلامة أو القفازات وينبه غرفة التحكم فوراً."}]},{id:"predict",icon:"fa-chart-line",color:"text-emerald-400",title:"PREDICT",titleAR:"يتنبأ",desc:"AI models analyze historical data to forecast failures before they occur.",descAR:"تحلل نماذج الذكاء الاصطناعي البيانات التاريخية للتنبؤ بالأعطال قبل حدوثها.",examples:[{title:"Pump Bearing Failure",detail:"Vibration and temperature trends predict bearing failure 7–14 days ahead, allowing planned replacement during the next scheduled shutdown."},{title:"Gas Compressor Surge",detail:"AI correlates suction pressure, discharge temperature, and RPM patterns to warn of an impending compressor surge."}],examplesAR:[{title:"فشل محمل المضخة",detail:"اتجاهات الاهتزاز ودرجة الحرارة تتنبأ بفشل المحمل قبل 7–14 يوماً، مما يسمح بالاستبدال المخطط خلال الإغلاق المجدول القادم."},{title:"ارتجاج ضاغط الغاز",detail:"يربط الذكاء الاصطناعي ضغط الشفط ودرجة حرارة التفريغ ونماذج الدوران للتحذير من ارتجاج ضاغز وشيك."}]},{id:"suggest",icon:"fa-lightbulb",color:"text-amber-400",title:"SUGGEST",titleAR:"يقترح",desc:"AI recommends actions based on real-time conditions and best practices.",descAR:"يوصي الذكاء الاصطناعي بالإجراءات بناءً على الظروف الفعلية وأفضل الممارسات.",examples:[{title:"Optimal Chemical Dosing",detail:"Based on flow rate, H2S levels, and temperature, AI suggests the exact corrosion inhibitor dose—reducing waste and cost."},{title:"Shift Priority Ranking",detail:"AI ranks open maintenance tickets by safety risk, production impact, and crew availability so you tackle the right job first."}],examplesAR:[{title:"الجرعة المثلى للمادة الكيميائية",detail:"بناءً على معدل التدفق ومستويات H2S ودرجة الحرارة، يقترح الذكاء الاصطناعي جرعة مثبط التآكل الدقيقة—مما يقلل النفايات والتكلفة."},{title:"تصنيف أولويات الوردية",detail:"يرتب الذكاء الاصطناعي تذاكر الصيانة المفتوحة حسب المخاطر على السلامة والتأثير على الإنتاج وتوفر الطاقم لتتعامل مع المهمة الصحيحة أولاً."}]}],SAFETY_RULES=[{title:"Trust But Verify",titleAR:"ثق لكن تحقق",text:"AI suggestions are starting points, not gospel. Cross-check with procedures, permits, and your own experience.",textAR:"اقتراحات الذكاء الاصطناعي هي نقاط بداية، ليست حقائق مطلقة. تحقق منها بالإجراءات والتصاريح وخبرتك الشخصية."},{title:"Data In, Truth Out",titleAR:"بيانات نظيفة = نتائج صحيحة",text:"If sensor data is dirty, missing, or miscalibrated, AI output will be wrong. Always validate inputs.",textAR:"إذا كانت بيانات أجهزة الاستشعار قذرة أو مفقودة أو معايرة بشكل خاطئ، ستكون مخرجات الذكاء الاصطناعي خاطئة. تحقق دائماً من المدخلات."},{title:"Human in the Loop",titleAR:"الإنسان في حلقة القرار",text:"On safety-critical decisions, the field engineer holds the final authority. AI advises; humans decide.",textAR:"في القرارات الحرجة للسلامة، يحمل المهندس الميداني السلطة النهائية. الذكاء الاصطناعي ينصح؛ والبشر يقررون."},{title:"Know the Limits",titleAR:"اعرف الحدود",text:"Every AI model has a scope. Do not use a pump-failure model to predict pipeline corrosion.",textAR:"كل نموذج ذكاء اصطناعي له نطاقه. لا تستخدم نموذج فشل المضخة للتنبؤ بتآكل خط الأنابيب."},{title:"Report Odd Behavior",titleAR:"بلّغ السلوك الغريب",text:"If AI gives weird or inconsistent results, flag it immediately. Odd output can signal a system or data fault.",textAR:"إذا أعطاك الذكاء الاصطناعي نتائج غريبة أو غير متسقة، بلّغ عنها فوراً. المخرجات الغريبة يمكن أن تشير إلى خطأ في النظام أو البيانات."}],QUIZ=[{q:"What is the primary rule when using AI for safety-critical decisions?",qAR:"ما هو أفضل وصف للذكاء الاصطناعي؟",options:["Follow AI blindly","Human in the loop","Ignore alarms","Disable sensors"],optionsAR:["روبوت يحل محل العمال","برنامج حاسوبي يمكنه التعلم من الأنماط واتخاذ القرارات","محرك بحث على الإنترنت","نظام أتمتة ميكانيكي فقط"],a:1,explain:"The human engineer always makes the final call on safety-critical actions.",explainAR:"الذكاء الاصطناعي يتعلق بالأنظمة البرمجية التي تتعلم من البيانات وتتخذ قرارات بناءً على الأنماط — إنه أكثر بكثير من مجرد أتمتة."},{q:"Which AI capability forecasts equipment failures before they happen?",qAR:"ما الذي يعنيه مصطلح 'التعلم الآلي'؟",options:["SEE","PREDICT","SUGGEST","TRANSLATE"],optionsAR:["تعليم الآلات كيفية التحرك","تعلم أجهزة الكمبيوتر من البيانات دون برمجتها بشكل صريح","تدريب بشري على صيانة الآلات","تعلم قيادة المركبات الآلية"],a:1,explain:"PREDICT uses trend analysis to warn of failures days or weeks ahead.",explainAR:"التعلم الآلي هو مجموعة فرعية من الذكاء الاصطناعي حيث تتعلم أجهزة الكمبيوتر من البيانات — فهي تجد الأنماط بنفسها."},{q:"Why should you verify an AI-generated translation of a safety procedure?",qAR:"ما هو أخطر شيء يجب فعله مع مخرجات الذكاء الاصطناعي في العمل الميداني؟",options:["AI translations are always perfect","Technical terms can be misinterpreted","It's faster not to","Procedures don't matter"],optionsAR:["التحقق منها مع إجراءات التشغيل القياسية","مناقشتها مع زميل أولاً","الوثوق بها بشكل أعمى دون تحقق","توثيقها في سجل التحول"],a:1,aAR:2,explain:"AI can mistranslate technical or safety-critical language. Always verify with a qualified person.",explainAR:"لا تثق أبداً بمخرجات الذكاء الاصطناعي بشكل أعمى في العمل الحرج للسلامة. تحقق دائماً مع الإجراءات والخبرة."},{q:"What does 'Trust But Verify' mean in field AI?",qAR:"ما الذي يجعل الصيانة التنبؤية المدعومة بالذكاء الاصطناعي أكثر فعالية من الصيانة المجدولة؟",options:["Never use AI","Accept AI output without checking","Use AI as a guide, then confirm","Blame AI if wrong"],optionsAR:["إنها أسرع","إنها أرخص","تتنبأ بالأعطال قبل حدوثها بناءً على البيانات الحقيقية","تستخدم أجزاء أقل"],a:2,explain:"Treat AI like a smart assistant: trust its input, but verify before acting.",explainAR:"الصيانة التنبؤية تستخدم بيانات حقيقية من المستشعرات للتنبؤ بموعد حدوث الأعطال — مما يسمح لك بالإصلاح قبل حدوث العطل مباشرة."},{q:"Which tool would help turn messy field notes into a formal report?",qAR:"ما هي أكبر قيود على الذكاء الاصطناعي اليوم؟",options:["Checklist Generator","Report Generator","Translation Tool","Safety Quiz"],optionsAR:["السرعة","يفتقر إلى الفهم الحقيقي والفطرة السليمة","التكلفة","استهلاك الطاقة"],a:1,explain:"The Report Generator structures raw notes into a professional handover or incident report.",explainAR:"الذكاء الاصطناعي يفتقر إلى الحس السليم الحقيقي والذكاء العاطفي — يمكنه معالجة البيانات لكنه لا يفهم السياق مثل الإنسان."},{q:"What happens if sensor data is dirty or miscalibrated?",qAR:"ما هو 'التوأم الرقمي' في العمليات الميدانية؟",options:["AI output becomes more accurate","AI output may be wrong","Nothing changes","AI fixes it automatically"],optionsAR:["روبوت مكرر","نسخة افتراضية من المعدات لتشغيل المحاكاة","قاعدة بيانات للصور الرقمية","نظام تحكم مزدوج"],a:1,explain:"Garbage in, garbage out. Bad data produces bad predictions and bad advice.",explainAR:"التوأم الرقمي هو نموذج افتراضي لمعداتك الحقيقية — يمكنك اختبار السيناريوهات دون مخاطرة بالمعدات الفعلية."},{q:"Which AI capability uses drones and cameras to detect anomalies?",qAR:"ماذا يجب أن تفعل إذا أعطى نظام الذكاء الاصطناعي نتيجة غريبة؟",options:["SUGGEST","PREDICT","SEE","None of the above"],optionsAR:["تجاهلها","الإبلاغ عنها والتحقق منها مع زميل أو مشرف","إعادة تشغيل النظام","قبولها كما هي"],a:2,aAR:1,explain:"SEE uses computer vision on images and video to spot leaks, corrosion, and PPE violations.",explainAR:"المخرجات الغريبة يمكن أن تشير إلى مشاكل في البيانات أو أعطال في النظام. دائماً قم بالإبلاغ عنها — يمكن أن تمنع وقوع حادث."},{q:"In the Prompt Engineering module, what makes a prompt 'good'?",qAR:"ما هو التعلم العميق؟",options:["It is very short","It includes role, context, and expected output","It has no details","It is written in all caps"],optionsAR:["دراسة المواضيع المعقدة بعمق","شبكات عصبية متعددة الطبقات تتعلم أنماطاً معقدة","حفر الآبار العميقة","قراءة الأدلة التقنية"],a:1,explain:"A strong prompt defines who the AI is (role), the situation (context), and what you want back (expected output).",explainAR:"التعلم العميق يستخدم طبقات متعددة من 'الخلايا العصبية' للتعرف على الأنماط المعقدة للغاية — مثل اكتشاف التآكل في صور خطوط الأنابيب."},{q:"Why is it dangerous for AI to auto-shutdown a zone without alerting the operator?",qAR:"ما هو مثال على الذكاء الاصطناعي في العمليات الميدانية اليوم؟",options:["It saves time","Operators lose situational awareness and can't verify","Shutdowns are never needed","AI is always correct"],optionsAR:["آلة حاسبة","نظام كاميرا يكتشف التسرب تلقائياً","مفتاح ربط","مقياس ضغط"],a:1,explain:"Safety-critical actions must keep the human informed. Blind automation removes accountability.",explainAR:"أنظمة الكشف عن التسرب المدعومة بالذكاء الاصطناعي تستخدم الكاميرات وخوارزميات الرؤية الحاسوبية لاكتشاف ومنع المخاطر البيئية."},{q:"What is the best first step if AI gives a strange or inconsistent result?",qAR:"كم عدد المهام اللازمة لإتقان المفاهيم الأساسية للذكاء الاصطناعي؟",options:["Ignore it","Flag it and check data inputs","Shut down the plant","Restart your phone"],optionsAR:["مهمة واحدة","جميع المهام الـ 15","المهمة الأخيرة فقط","لا تحتاج لأي مهام"],a:1,explain:"Strange AI output often signals bad data or model drift. Flag it and investigate inputs first.",explainAR:"كل مهمة تبني مهارة محددة. إكمال جميع المهام الـ 15 يمنحك أساساً شاملاً للذكاء الاصطناعي الميداني."},{q:"What is a 'hallucination' in AI?",qAR:"ما هو دور الذكاء الاصطناعي في اكتشاف الشذوذ؟",options:["A hardware fault","AI making up a wrong answer","A camera glitch","A sensor alarm"],optionsAR:["لا دور له","الإبلاغ عن الحالات الشاذة في بيانات المستشعرات","إصلاح المعدات","كتابة التقارير"],a:1,explain:"Hallucination is when AI generates confident but false information. Always verify critical AI outputs.",explainAR:"الذكاء الاصطناعي يراقب بيانات المستشعرات باستمرار ويبلغ عن الأنماط غير الطبيعية — غالباً قبل أن يلاحظ المشغلون البشريون أي خطأ."},{q:"Which describes 'Edge AI'?",qAR:"لماذا من المهم لمهندسي الميدان فهم أساسيات الذكاء الاصطناعي؟",options:["AI in the cloud","AI running on local devices","AI at headquarters","AI in training"],optionsAR:["ليس مهماً","لاستبدال المبرمجين","لاتخاذ قرارات أفضل والتحقق بشكل صحيح من اقتراحات الذكاء الاصطناعي","لإصلاح أجهزة الكمبيوتر"],a:1,aAR:2,explain:"Edge AI runs on local sensors or devices, enabling real-time decisions without internet latency.",explainAR:"معرفة كيفية عمل الذكاء الاصطناعي يساعدك على الثقة به عند الحاجة والتشكيك فيه عند الضرورة — أنت الخبير الأخير."}],APP_GALLERY=[{icon:"fa-wrench",title:"Predictive Maintenance",titleAR:"الصيانة التنبؤية",desc:"AI models analyze vibration, oil analysis, and thermal data to schedule maintenance before failure.",descAR:"تحلل نماذج الذكاء الاصطناعي الاهتزازات وتحليل الزيوت والبيانات الحرارية لجدولة الصيانة قبل الفشل."},{icon:"fa-plane",title:"Drone Inspection",titleAR:"تفتيش الطائرات بدون طيار",desc:"Autonomous drones with AI vision inspect flare stacks, tanks, and pipelines without scaffolding or rope access.",descAR:"طائرات بدون طيار ذاتية مع رؤية ذكاء اصطناعي تفتش مشاعل الاحتراق والخزانات والأنابيب بدون سقالات أو وصول بالحبال."},{icon:"fa-shield-halved",title:"Safety Monitoring",titleAR:"مراقبة السلامة",desc:"Real-time AI video analytics enforce PPE compliance and detect perimeter intrusions or gas leaks.",descAR:"تحليل فيديو ذكاء اصطناعي في الوقت الفعلي لفرض الالتزام بمعدات الحماية الشخصية واكتشاف التسللات أو تسرب الغاز."},{icon:"fa-smog",title:"Emissions Tracking",titleAR:"تتبع الانبعاثات",desc:"AI correlates process data with sensor networks to detect fugitive emissions and quantify GHG leakage.",descAR:"يربط الذكاء الاصطناعي بيانات العمليات مع شبكات الاستشعار للكشف عن الانبعاثات الهاربة وتحديد تسرب الغازات الدفيئة."},{icon:"fa-microchip",title:"Edge AI Sensors",titleAR:"أجهزة استشعار الذكاء الاصطناعي الحافة",desc:"On-device AI at the edge enables millisecond anomaly detection without cloud dependency or latency.",descAR:"تمكين الذكاء الاصطناعي على الجهاز من اكتشاف الشذوذ في أجزاء من الثانية دون الاعتماد على السحابة."},{icon:"fa-headset",title:"AI Assistant",titleAR:"مساعد الذكاء الاصطناعي",desc:"Voice-enabled AI answers technical queries, pulls up procedures, and logs observations hands-free in noisy environments.",descAR:"ذكاء اصطناعي صوتي يجيب على الاستفسارات الفنية ويستدعي الإجراءات ويسجل الملاحظات دون استخدام اليدين في البيئات الصاخبة."},{icon:"fa-water",title:"Leak Detection",titleAR:"كشف التسربات",desc:"Acoustic and pressure AI models detect pipeline leaks within meters, reducing response time from hours to minutes.",descAR:"نماذج ذكاء اصطناعي صوتية وضغطية تكشف تسربات الأنابيب بدقة أمتار، مما يقلل وقت الاستجابة من ساعات إلى دقائق."}],MOCK_WISHES=["AI that reads gauge faces automatically through my phone camera","Voice-activated AI that writes shift reports while I talk","AI that predicts sand production before it damages the choke","Real-time Arabic↔English safety translator for toolbox talks","Smart checklist that adapts based on weather and permit type","AI that auto-fills maintenance tickets from my voice notes","A heads-up display that overlays pipe pressure on my safety glasses"],JARGON=[{term:"Machine Learning",termAR:"الصيانة التنبؤية",field:"The AI learns from past data, like a senior operator who remembers every failure.",fieldAR:"استخدام بيانات المستشعرات والذكاء الاصطناعي للتنبؤ بموعد فشل المعدات — الإصلاح قبل حدوث العطل مباشرة.",example:"The more pump failures it sees, the better it predicts the next one.",exampleAR:"اكتشاف الاهتزاز المتزايد قبل 5 أيام من فشل المحمل."},{term:"Computer Vision",termAR:"التوأم الرقمي",field:"AI that watches cameras and images like a digital safety inspector.",fieldAR:"نسخة افتراضية لمعداتك لتشغيل المحاكاة.",example:"It checks if everyone is wearing hard hats from CCTV feeds.",exampleAR:"اختبار تسلسل بدء التشغيل على ضاغط افتراضي قبل لمس الضاغط الحقيقي."},{term:"Predictive Maintenance",termAR:"الشبكة العصبية",field:"Fixing things before they break, based on data trends.",fieldAR:"نظام ذكاء اصطناعي مصمم على غرار الدماغ البشري — طبقات من 'الخلايا العصبية' تتعلم الأنماط.",example:"Changing a bearing because vibration is rising, not because it seized.",exampleAR:"التعرف على التآكل في صور خطوط الأنابيب من آلاف الأمثلة."},{term:"Edge AI",termAR:"اكتشاف الشذوذ",field:"AI that runs on-site devices without needing the internet.",fieldAR:"الذكاء الاصطناعي الذي يتعلم الشكل 'الطبيعي' ويبلغ عندما يكون شيء ما مختلفاً.",example:"A sensor on the pipeline that detects leaks in milliseconds without cloud delay.",exampleAR:"الإبلاغ عن انخفاض مفاجئ في ضغط رأس البئر لا يتطابق مع أنماط التدفق العادية."},{term:"Hallucination",termAR:"التعلم الخاضع للإشراف",field:"When AI makes up an answer that sounds right but is wrong.",fieldAR:"تدريب الذكاء الاصطناعي على أمثلة معنونة حيث تكون الإجابات معروفة.",example:"AI inventing a maintenance step that doesn't exist in the official procedure.",exampleAR:"إظهار 10,000 صورة معنونة 'تآكل' أو 'لا تآكل' للذكاء الاصطناعي."},{term:"Digital Twin",termAR:"هندسة الأوامر",field:"A virtual copy of your equipment that runs simulations.",fieldAR:"فن كتابة أسئلة واضحة ومحددة السياق للحصول على أفضل إجابات من الذكاء الاصطناعي.",example:"Testing a startup sequence on a virtual compressor before touching the real one.",exampleAR:"بدلاً من 'مشكلة المضخة؟'، اكتب: 'أنت مهندس ميداني كبير. المضخة P-201...'"}],SPOT_AI=[{text:"A temperature gauge on a compressor triggers an alarm when it reads >120°C.",textAR:"تقرير صيانة تنبؤي: 'المضخة P-201 تظهر اهتزازاً متزايداً (4.1 → 5.9 مم/ثانية) على مدى 5 أيام. خطر فشل المحمل بحلول يوم الجمعة. موصى به: جدولة فحص الموجات فوق الصوتية هذا الأسبوع.'",answer:!1,answerAR:!0,explain:"This is a simple rule-based alarm. AI would analyze trends, patterns, and correlations across multiple sensors.",explainAR:"تقرير منظم يعتمد على البيانات مع اتجاهات محددة وتوصية قابلة للتنفيذ — علامات كلاسيكية للمحتوى المولد بالذكاء الاصطناعي.",humanOrAi:"🤖 منقول بالذكاء الاصطناعي — اتجاهات كمية وتنسيق منظم"},{text:"A drone flies over a pipeline and automatically flags corrosion spots in photos.",textAR:"زميلك يرسل: 'مرحباً، بناءً على خبرتي، المحمل على P-201 يبدو أكثر ضوضاءً من المعتاد. لقد رأيت هذا من قبل — استبدله في الوردية التالية. أنا متأكد بنسبة 80% من أن هذا هو الحل.'",answer:!0,answerAR:!1,explain:"This is AI computer vision (SEE). It recognizes patterns of corrosion that are hard to spot manually.",explainAR:"نبرة محادثة، تعتمد على الخبرة الشخصية، غير متأكد بنسبة 100% — هذا تواصل بشري نموذجي.",humanOrAi:"👤 كتبه إنسان — نبرة محادثة وشعور غريزي"},{text:"A SCADA system logs pressure readings every minute to a historian database.",textAR:"سجل دردشة: 'استناداً إلى البيانات التاريخية، مضخات الطرد المركزي ذات أنماط الاهتزاز التي تتجاوز 1.2 مم/ثانية/يوم تخضع عادةً لاستبدال المحمل خلال 72 ساعة. ومع ذلك، يجب أن تؤكد الفحوصات الميدانية سلامة التشغيل قبل الشد.'",answer:!1,answerAR:!0,explain:"Data logging is not AI. AI would use that data to predict failures or suggest actions.",explainAR:"محتوى منظم يعتمد على البيانات مع تحذير مناسب — على الأرجح مادة تدريبية معدلة بالذكاء الاصطناعي.",humanOrAi:"🤖 معدل بالذكاء الاصطناعي — إحصائي مع تحذير بشري"},{text:"A system analyzes vibration spectra and predicts bearing failure 10 days early.",textAR:"تعليق في سجل الوردية: 'ملاحظة لطاقم الصباح: P-201 تصدر صوت صفير عند بدء التشغيل. المرة الأخيرة التي حدث فيها هذا كانت بسبب فلتر مسدود. افحصوا ذلك قبل تشغيل الإنتاج الكامل من فضلكم.'",answer:!0,answerAR:!1,explain:"This is Predictive AI (PREDICT). It learns from historical patterns to forecast failures.",explainAR:"نبرة محادثة، خبرة شخصية، طلب مهذب — إدخال سجل وردية بشري بحت.",humanOrAi:"👤 كتبه إنسان — سجل وردية غير رسمي"},{text:"An AI chatbot translates a work permit from English to Arabic for a contractor.",textAR:"توصية تحليل البيانات: 'يشير تحليل الانحدار لـ 847 مضخة عبر 3 حقول إلى أن 78.3% من حالات فشل المحامل مسبوقة بـ 48-96 ساعة من الاهتزاز المتزايد بسرعة > 0.8 مم/ثانية/يوم. فترة التدخل المثلى هي 24-48 ساعة قبل الفشل المتوقع.'",answer:!0,explain:"This is AI translation (SUGGEST/SEE hybrid). It uses language models to convert technical text.",explainAR:"لغة إحصائية بحتة مع نسب دقيقة وأحجام عينات — مولد بالذكاء الاصطناعي.",humanOrAi:"🤖 مكتوب بالذكاء الاصطناعي — تقني إحصائي"},{text:"A flare stack camera records video that is reviewed manually once per week.",textAR:"أثناء اجتماع السلامة الصباحي: 'اسمعوا، المضخة P-201 لا تبدو على ما يرام. أنا أعمل في هذه المنصة منذ 9 سنوات ويمكنني القول عندما يكون هناك شيء غير صحيح. دعونا نطلب من الصيانة التحقق منها اليوم قبل أن تتفاقم.'",answer:!1,explain:"Manual review is not AI. AI would analyze the video automatically in real time to flag anomalies.",explainAR:"لغة منطوقة، تعتمد على الخبرة، حدس — هذا تواصل بشري خالص.",humanOrAi:"👤 إنسان يتحدث — حدس وخبرة"}],CASE_STUDY={title:"The Bearing That Spoke",steps:[{story:"Monday 06:00 — Shift handover notes Pump P-101 is 'a bit noisy lately.' The AI dashboard shows vibration trending up (4.2 → 5.8 mm/s) over 3 days, but still below the 7.0 alarm limit.",question:"As lead engineer, what is your best first move?",choices:[{text:"Ignore it — it's below alarm",correct:!1,consequence:"By Wednesday the bearing seizes, causing an unplanned shutdown and $120K in lost production. The AI saw the trend; the alarm only saw the limit."},{text:"Schedule ultrasonic inspection this week",correct:!0,consequence:"Correct! Proactive inspection catches bearing wear early, preventing unplanned downtime and costly repairs."},{text:"Emergency shutdown now",correct:!1,consequence:"You lose 48 hours of production. The bearing was degrading but still had days of safe life. Predictive action beats reactive panic."}]},{story:"Tuesday 09:00 — Ultrasonic inspection confirms inner race damage. The AI predicts failure within 5–7 days. You have a planned maintenance window on Thursday.",question:"What do you do?",choices:[{text:"Wait for the planned window",correct:!0,consequence:"Correct! Using the planned shutdown window avoids extra downtime while still replacing the worn part before failure."},{text:"Run the pump to failure",correct:!1,consequence:"The bearing seizes Friday night. Emergency callouts, safety risk, and 3x the repair cost. Always act on predictive warnings."},{text:"Swap the pump immediately",correct:!1,consequence:"Rushing the swap without proper staging risks mistakes. The AI gave you a window—use it wisely."}]},{story:"Thursday 08:00 — Maintenance swaps the bearing during the planned window. The removed bearing shows advanced inner race damage exactly where the AI predicted.",question:"What is the most important follow-up action?",choices:[{text:"Document the AI prediction accuracy",correct:!0,consequence:"Correct! Documenting AI accuracy builds trust in the system and improves future predictions through feedback loops."},{text:"Ignore the data — job is done",correct:!1,consequence:"Without feedback, the AI cannot learn. Logging outcomes improves predictions for P-102, P-103, and the whole fleet."},{text:"Disable AI alerts on P-101",correct:!1,consequence:"Disabling alerts removes protection. The next fault might be different. Keep the AI watching."}]},{story:"Friday 14:00 — Management asks if AI is worth the investment. You pull the report: one saved unplanned shutdown = $120K avoided. The bearing cost $4K.",question:"What is the ROI message?",choices:[{text:"AI pays for itself with one catch",correct:!0,consequence:"Correct! A single early catch of a major failure can save millions — far exceeding the cost of AI deployment."},{text:"AI replaces engineers",correct:!1,consequence:"Wrong message. AI assisted your decision. You chose the timing, verified the data, and managed the risk. Humans remain essential."},{text:"AI is only for big equipment",correct:!1,consequence:"AI scales from pumps to compressors to entire plants. Every asset that fails predictably is a candidate."}]}]};function getCaseStudy(){return"ar"!==CURRENT_LANG?CASE_STUDY:CASE_STUDY_AR}const CASE_STUDY_AR={title:"المحمل الذي تحدث",steps:[{story:"الإثنين 06:00 — ملاحظات تسليم الوردية تشير إلى أن المضخة P-101 'تصدر ضوضاء قليلاً مؤخراً.' لوحة تحكم الذكاء الاصطناعي تظهر اتجاه الاهتزاز صاعداً (4.2 → 5.8 مم/ث) على مدى 3 أيام، لكنه لا يزال تحت حد الإنذار 7.0.",question:"كمهندس رئيسي، ما هي أفضل خطوة أولى؟",choices:[{text:"تجاهلها — إنها تحت حد الإنذار",correct:!1,consequence:"بحلول الأربعاء، ينفجر المحمل مسبباً توقفاً غير مخطط وخسارة 120 ألف دولار في الإنتاج. رأى الذكاء الاصطناعي الاتجاه؛ رأى الإنذار فقط الحد."},{text:"جدولة فحص بالموجات فوق الصوتية هذا الأسبوع",correct:!0,consequence:"صحيح! الفحص الاستباقي يلتقط تآكل المحمل مبكراً، مما يمنع التوقف غير المخطط والإصلاحات المكلفة."},{text:"إيقاف طوارئ الآن",correct:!1,consequence:"تخسر 48 ساعة من الإنتاج. كان المحمل يتدهور لكنه لا يزال لديه أيام من العمر الآمن. الفعل التنبؤي يتفوق على الذعر التفاعلي."}]},{story:"الثلاثاء 09:00 — يؤكد الفحص بالموجات فوق الصوتية تلف السطح الداخلي. يتنبأ الذكاء الاصطناعي بالفشل خلال 5–7 أيام. لديك نافذة صيانة مخططة يوم الخميس.",question:"ماذا تفعل؟",choices:[{text:"انتظر النافذة المخططة",correct:!0,consequence:"صحيح! استخدام نافذة الإغلاق المخططة يتجنب التوقف الإضافي مع استبدال القطعة التالفة قبل الفشل."},{text:"شغل المضخة حتى الفشل",correct:!1,consequence:"ينفجر المحمس مساء الجمعة. استدعاءات طوارئ، مخاطر سلامة، وتكلفة إصلاح 3 أضعاف. دائماً اتصر على التحذيرات التنبؤية."},{text:"استبدل المضخة فوراً",correct:!1,consequence:"الاستعجال في الاستبدال دون التحضير المناسب ي risking الأخطاء. أعطاك الذكاء الاصطناعي نافذة — استخدمها بحكمة."}]},{story:"الخميس 08:00 — تستبدل الصيانة المحمل أثناء النافذة المخططة. يظهر المحمل المستخرج تلفاً متقدماً في السطح الداخلي بالضبط حيث تنبأ الذكاء الاصطناعي.",question:"ما هي أهم إجراء متابعة؟",choices:[{text:"توثيق دقة التنبؤ بالذكاء الاصطناعي",correct:!0,consequence:"صحيح! توثيق دقة التنبؤ يبني الثقة في النظام ويحسن التنبؤات المستقبلية من خلال حلقات الملاحظات."},{text:"تجاهل البيانات — المهمة انتهت",correct:!1,consequence:"بدون ملاحظات، لا يمكن للذكاء الاصطناعي التعلم. تسجيل النتائج يحسن التنبؤات لـ P-102، P-103، والأسطول بأكمله."},{text:"تعطيل تنبيهات الذكاء الاصطناعي على P-101",correct:!1,consequence:"تعطيل التنبيهات يزيل الحماية. العطل التالي قد يكون مختلفاً. اترك الذكاء الاصطناعي يراقب."}]},{story:"الجمعة 14:00 — يسأل الإدارة عما إذا كان الذكاء الاصطناعي يستحق الاستثمار. تسحب التقرير: توقف غير مخطط واحد م avoided = 120 ألف دولار. كلف المحمل 4 آلاف دولار.",question:"ما هي رسالة العائد على الاستثمار؟",choices:[{text:"الذكاء الاصطناعي يدفع لنفسه بإنجاز واحد",correct:!0,consequence:"صحيح! الاكتشاف المبكر الواحد لعطل كبير يمكن أن يوفر الملايين — متجاوزاً بكثير تكلفة نشر الذكاء الاصطناعي."},{text:"الذكاء الاصطناعي يستبدل المهندسين",correct:!1,consequence:"رسالة خاطئة. ساعدك الذكاء الاصطناعي في قرارك. أنت اخترت التوقيت، وتحققت من البيانات، وأدارت المخاطر. البشر لا يزالون ضروريين."},{text:"الذكاء الاصطناعي فقط للمعدات الكبيرة",correct:!1,consequence:"يتدرج الذكاء الاصطناعي من المضخات إلى الضواغط إلى المصانع بأكملها. كل أصل يفشل بشكل متوقع هو مرشح."}]}]},DAILY_TIPS=["💡 Tip: Always check AI outputs against your field experience.","💡 Tip: Clean sensor data = reliable AI predictions.","💡 Tip: If an AI result feels wrong, flag it immediately.","💡 Tip: Good prompts include Role, Context, and Expected Output.","💡 Tip: Edge AI works even when the internet is down.","💡 Tip: A digital twin lets you test 'what-if' safely.","💡 Tip: AI sees patterns; humans make decisions."],AI_OR_HUMAN=[{text:'"Based on vibration spectra analysis at 3x RPM with sidebands at bearing pass frequency, the inner race defect on P-101 is progressing. Recommend replacement within 72 hours to avoid catastrophic failure."',textAR:"'بناءً على تحليل 2,500 سجل صيانة، فإن السبب الأكثر احتمالاً لارتفاع درجة حرارة الضاغط في الظروف المحيطة > 40 درجة مئوية هو انسداد زعانف المبرد البيني (63% من الحالات).'",answer:!0,explain:"This is AI (Predictive Maintenance). It analyzed vibration spectra patterns, identified the specific fault type (inner race), and estimated time-to-failure — all hallmarks of AI pattern recognition.",explainAR:"لغة إحصائية دقيقة بحجم عينة كبير — نمط توليد كلاسيكي للذكاء الاصطناعي.",humanOrAi:"AI 🤖",humanOrAiAR:"🤖 نص منقول بالذكاء الاصطناعي"},{text:"\"Pump 3B tripped again at 14:30. This is the third time this month. Last time it was the seal, but I have a hunch it's the coupling this time because of the way it sounds on startup. Let's pull the coupling first before we order parts.\"",textAR:"'مرحباً يا رفاق، الضاغط في الوحدة 4 يسخن مرة أخرى. إنه يفعل هذا كل صيف. قمنا بتنظيف الزعانف الشهر الماضي لكن الطقس الحار يعود. ربما يجب أن نتحقق من صمام التمدد هذه المرة.'",answer:!1,explain:"This is a HUMAN engineer. The 'hunch' based on sound, the gut-feel prioritization, and referencing past experience are classic human intuition — not data-driven AI analysis.",explainAR:"نبرة محادثة غير رسمية مع سياق موسمي وتجربة وخطأ — بشري خالص.",humanOrAi:"Human 👷",humanOrAiAR:"👤 إنسان يكتب — غير رسمي وسياقي"},{text:'"Analyzing 12 months of compressor discharge pressure, suction temperature, and flow rate: detected a 7% efficiency degradation trend that correlates with ambient temperature spikes above 42°C. Recommend cleaning the inlet filters and checking intercooler performance before summer."',textAR:"'يشير تحليل الاهتزاز الطيفي إلى مرور الشفرة عند 6X سرعة الدوران، متوافق مع تآكل مروحة السحب. انحراف الضغط التفاضلي عبر مرشح السحب هو 2.3 مرة من خط الأساس.'",answer:!0,explain:"This is AI. It correlated multiple variables over a long time period, detected a subtle 7% trend, and linked it to environmental conditions — exactly what predictive AI does best.",explainAR:"مصطلحات تقنية دقيقة مع مضاعفات تردد محددة — توليد تقني للذكاء الاصطناعي.",humanOrAi:"AI 🤖",humanOrAiAR:"🤖 بيانات تقنية مولدة بالذكاء الاصطناعي"},{text:"\"I've worked this field for 15 years. When the H2S levels start creeping up in well AB-7 and AB-9 around June, you know it's going to be a rough summer. I'd suggest we pre-position scavenger chemicals at those wells by mid-May, just like we did back in 2019 when we got caught off guard.\"",textAR:"'المنصة تهتز أكثر من المعتاد اليوم. لقد كنت هنا لمدة 3 سنوات وشعرت بهذا من قبل — عادة ما يعني ذلك أن مروحة التبريد غير متوازنة. سأطلب من الفني فحصها عندما يمر.'",answer:!1,explain:"This is a HUMAN. The experiential knowledge ('15 years'), personal memory of 2019, and intuitive seasonal prediction based on lived experience are distinctly human traits.",explainAR:"شعور غريزي يعتمد على الخبرة بنبرة محادثة — حدس بشري.",humanOrAi:"Human 👷",humanOrAiAR:"👤 إنسان يستخدم الحدس"},{text:'"Cross-referencing 2,450 maintenance work orders with equipment failure data: the MTBF of Pump P-101 is 847 hours, which is 22% below the fleet average of 1,086 hours. Root cause correlation suggests inadequate lubrication frequency. Recommend increasing lube interval from 500 to 350 hours."',textAR:"'تشير بيانات SCADA التاريخية إلى أن المضخات التي تعمل خارج نطاق BEP بنسبة >15% لمدة >4 ساعات لديها احتمالية 3.2 مرة للتجريف. الحل الموصى به: خنق صمام التفريغ إلى 45-50% فتح.'",answer:!0,explain:"This is AI. It processed 2,450 records, calculated exact MTBF statistics, compared against fleet averages, and identified a specific root cause — far beyond manual analysis.",explainAR:"بيانات كمية مع قيم عتبة دقيقة — تم إنشاؤه بواسطة محرك توصية الذكاء الاصطناعي.",humanOrAi:"AI 🤖",humanOrAiAR:"🤖 نص تقني للذكاء الاصطناعي"},{text:"\"The morning report says vibration is high, but honestly, I wouldn't shut it down just yet. These old pumps always run a bit rough. Give it another shift and keep an eye on it. If maintenance asks, tell them we're monitoring the situation.\"",textAR:"'هل يمكن لأحد أن يمر لتفقد المضخة P-12؟ قراءة التفريغ غير مستقرة وأسمع صوت نقر غريب. لست متأكداً مما إذا كان خطيراً لكنه بالتأكيد مختلف عن الأسبوع الماضي.'",answer:!1,explain:"This is a HUMAN. The casual risk tolerance ('give it another shift'), anecdotal reasoning ('old pumps always run rough'), and lack of data-driven justification are human — not AI — decision patterns.",explainAR:"طلب مساعدة غير رسمي مع ملاحظة حسية — تواصل بشري.",humanOrAi:"Human 👷",humanOrAiAR:"👤 إنسان يطلب المساعدة"}],SPEED_ROUND_QUESTIONS=[{q:"AI that runs on-site devices without internet is called?",qAR:"الذكاء الاصطناعي يمكنه التنبؤ بفشل المعدات",opts:["Cloud AI","Edge AI","Server AI","Remote AI"],optsAR:["صح","خطأ","في بعض الأحيان","فقط للصيانة"],a:1,aAR:0},{q:"What is the first rule of AI safety in the field?",qAR:"التعلم الآلي = برمجة كل قاعدة",opts:["Trust AI completely","Trust But Verify","Disable AI alerts","Ignore procedures"],optsAR:["صح","خطأ","نعم في بايثون","فقط في إكسل"],a:1},{q:"Which AI capability uses drones and cameras?",qAR:"التوأم الرقمي هو:",opts:["PREDICT","SUGGEST","SEE","TEACH"],optsAR:["روبوت حقيقي","نسخة افتراضية","مقياس ضغط","قاعدة بيانات"],a:2,aAR:1},{q:"What does 'hallucination' mean in AI?",qAR:"الذكاء الاصطناعي يفتقر إلى:",opts:["A hardware error","AI making up wrong answers","Screen flickering","Sensor failure"],optsAR:["السرعة","الفهم الحقيقي","البيانات","الذاكرة"],a:1},{q:"What should a good prompt include?",qAR:"أخطر خطأ في استخدام الذكاء الاصطناعي:",opts:["Only the question","Role, Context, Expected Output","Just keywords","A long paragraph"],optsAR:["بطئه","الثقة العمياء","التكلفة","التعقيد"],a:1},{q:"Can AI predict pump failures before they happen?",qAR:"الصيانة التنبؤية:",opts:["No, never","Yes, using vibration & temp trends","Only after failure","Only with new equipment"],optsAR:["تخمن","تستخدم اتجاهات البيانات","تتبع الروزنامة","تتجاهل أجهزة الاستشعار"],a:1},{q:"What does 'garbage in, garbage out' mean?",qAR:"اكتشاف الشذوذ يجد:",opts:["AI fixes bad data","Bad data = bad AI output","AI ignores bad data","Only clean sensors matter"],optsAR:["كل شيء","أنماطاً غير طبيعية","مشاكل الشبكة","أخطاء الترميز"],a:1},{q:"Who makes the final safety decision?",qAR:"الشبكة العصبية:",opts:["The AI system","The field engineer","The sensor","The software vendor"],optsAR:["شبكة إنترنت","طبقات ذكاء اصطناعي","لوحة كهرباء","كابل"],a:1},{q:"What is a Digital Twin?",qAR:"يحتاج الذكاء الاصطناعي في الميدان إلى:",opts:["A backup computer","A virtual copy of equipment","Two identical sensors","A spare part"],optsAR:["لا مشرفين","إشراف بشري","مبرمجين فقط","إنترنت"],a:1},{q:"AI translation of safety procedures should be?",qAR:"متوسط درجة حرارة المحرك: 85°م. قيمة شاذة: 850°م. ماذا تفعل؟",opts:["Trusted blindly","Deleted immediately","Verified by a qualified person","Never used"],optsAR:["تحتفظ بها","تعلمها كقيمة شاذة","تتجاهل المستشعر","تضاعف المتوسط"],a:2,aAR:1},{q:"Which is a REAL AI application in the field?",qAR:"أي من التطبيقات التالية هو ذكاء اصطناعي حقيقي في الميدان؟",opts:["SCADA data logging","Rule-based alarm at 120°C","Drone pipeline corrosion detection","Manual gauge reading"],optsAR:["تسجيل بيانات SCADA","إنذار قائم على قاعدة عند 120°م","كشف التآكل في خطوط الأنابيب بالطائرات بدون طيار","قراءة العداد يدوياً"],a:2},{q:"If AI gives a strange result, you should?",qAR:"إذا أعطى الذكاء الاصطناعي نتيجة غريبة، ماذا تفعل؟",opts:["Ignore it","Flag it and check data inputs","Blame the operator","Shut down everything"],optsAR:["تتجاهلها","تضع علامة عليها وتتحقق من مدخلات البيانات","تلوم المشغل","توقف كل شيء"],a:1},{q:"What does PREDICT do?",qAR:"ماذا يفعل PREDICT (التنبؤ)؟",opts:["Fixes equipment","Forecasts failures before they happen","Takes photos","Translates text"],optsAR:["يصلح المعدات","يتنبأ بالأعطال قبل حدوثها","يلتقط صوراً","يترجم النصوص"],a:1},{q:"Can AI replace field engineers completely?",qAR:"هل يمكن للذكاء الاصطناعي استبدال مهندسي الميدان بالكامل؟",opts:["Yes, fully","No, it assists not replaces","Only on weekends","Only for paperwork"],optsAR:["نعم، بالكامل","لا، يساعد ولا يستبدل","فقط في عطلات نهاية الأسبوع","فقط للأوراق"],a:1},{q:"What is Machine Learning?",qAR:"ما هو التعلم الآلي؟",opts:["A hardware device","AI that learns from past data","A type of wrench","Manual calculations"],optsAR:["جهاز hardware","ذكاء اصطناعي يتعلم من البيانات السابقة","نوع من المفاتيح","حسابات يدوية"],a:1},{q:"Why verify AI safety translations?",qAR:"لماذا التحقق من ترجمات إجراءات السلامة بالذكاء الاصطناعي؟",opts:["They're always perfect","Technical terms can be misinterpreted","It saves time to skip","Procedures don't matter"],optsAR:["هي دائماً مثالية","قد تُفهم المصطلحات التقنية بشكل خاطئ","التخطي يوفر الوقت","الإجراءات لا تهم"],a:1},{q:"What detects pipeline leaks within meters?",qAR:"ما الذي يكشف تسرب خطوط الأنابيب بدقة مترية؟",opts:["Manual inspection only","Acoustic & pressure AI models","Tape measures","Visual guesswork"],optsAR:["الفحص اليدوي فقط","نماذج الذكاء الاصطناعي الصوتية وضغطية","أشرطة القياس","التخمين البصري"],a:1},{q:"AI in PPE compliance monitoring uses?",qAR:"الذكاء الاصطناعي في مراقبة التزام معدات الوقاية الشخصية يستخدم؟",opts:["Audio only","Computer vision on CCTV","Smell sensors","Weight scales"],optsAR:["صوت فقط","رؤية حاسوبية على الكاميرات","مستشعرات رائحة","موازين الوزن"],a:1},{q:"How far ahead can AI predict bearing failure?",qAR:"إلى أي مدى يمكن للذكاء الاصطناعي التنبؤ بفشل المحمل؟",opts:["1 hour","7-14 days","Never","1 year minimum"],optsAR:["ساعة واحدة","7-14 يوماً","أبداً","سنة على الأقل"],a:1},{q:"What is the best response to 'the AI says shut down'?",qAR:"ما هو أفضل رد على 'يقول الذكاء الاصطناعي إغلاق'؟",opts:["Shut down immediately","Verify, check procedures, then decide","Ignore AI completely","Call IT support first"],optsAR:["الإغلاق فوراً","التحقق والاطلاع على الإجراءات ثم اتخاذ القرار","تجاهل الذكاء الاصطناعي تماماً","الاتصال بدعم تكنولوجيا المعلومات أولاً"],a:1}],DATA_ISSUES=[{title:"Missing Discharge Pressure",titleAR:"قراءات مفقودة",scenario:"Pump P-101 dataset: 500 rows of hourly readings. The discharge pressure column has 47 blank cells scattered across different dates.",scenarioAR:"يسجل مستشعر الضغط في رأس البئر A-12 'N/A' لمدة 3 ساعات كل ليلة بين 02:00 و 05:00.",question:"What's the problem and impact?",questionAR:"ما هي المشكلة في مجموعة البيانات هذه؟",options:[{text:"No problem — AI handles missing data fine",correct:!1,explain:"Wrong. Missing data creates gaps in trend analysis. The AI might miss a gradual pressure rise that signals impeller wear."},{text:"Missing values = missing patterns. AI predictions may be unreliable for those time periods.",correct:!0,explain:"Correct! AI needs continuous data to detect trends. 47 gaps = 47 blind spots in your failure prediction."},{text:"Just fill them with zeros",correct:!1,explain:"Filling with zeros creates fake data. The AI would see pressure dropping to zero and might falsely predict immediate failure."}],optionsAR:[{text:"المستشعر معطل — البيانات المفقودة تفسد أي حساب متوسط يومي",correct:!0,explain:"صحيح! 3 ساعات من البيانات المفقودة (12.5% من اليوم) تحرف المتوسطات وتخفي الاتجاهات. يحتاج فريق الصيانة إلى فحص مصدر طاقة المستشعر أو الاتصال."},{text:"إنها تعمل بشكل طبيعي — لا داعي للقلق",correct:!1,explain:"12.5% من البيانات المفقودة كل يوم ليست طبيعية. أي نظام ذكاء اصطناعي يستخدم هذه البيانات سيقدم تنبؤات خاطئة."},{text:"ما عليك سوى ملء القيم المفقودة بالصفر",correct:!1,explain:"الحشو بالصفر يخلق انخفاضات زائفة في قراءات الضغط سيفسرها الذكاء الاصطناعي بشكل خاطئ على أنها انخفاض مفاجئ في الضغط."}]},{title:"Wrong Temperature Units",titleAR:"وحدات غير متناسقة",scenario:"Gas compressor C-101 logs show discharge temperature jumping from 85°C to 185°C overnight. Upon investigation, maintenance entered one reading in Fahrenheit (185°F = 85°C).",scenarioAR:"تسجل ثلاثة آبار في نفس المنصة الضغط بوحدات مختلفة: البئر A بالبار، والبئر B بالرطل/بوصة مربعة، والبئر C بالكيلوباسكال.",question:"What impact does this have?",questionAR:"لماذا هذه مشكلة لتحليل الذكاء الاصطناعي؟",options:[{text:"AI predicts a false overheat alarm — wasted inspection",correct:!0,explain:"Exactly. The AI sees an impossible 100°C spike and flags an emergency. The crew inspects a perfectly healthy compressor."},{text:"No impact — AI ignores single outliers",correct:!1,explain:"AI can flag single outliers as anomalies. A 100°C jump is physiochemical impossible and will trigger false alerts."},{text:"Just convert all readings to Fahrenheit",correct:!1,explain:"Adding more unit confusion makes the data worse. The fix is enforcing °C consistently in the data entry form."}],optionsAR:[{text:"ليست مشكلة — فقط قم بتحويلها",correct:!1,explain:"إذا لم تكتشف مشكلة الوحدة، ستتم مقارنة 50 بار بـ 50 PSI على أنهما 'متساويان' — إنهما ليسا كذلك. يحتاج الذكاء الاصطناعي إلى وحدات متسقة."},{text:"يقارن الذكاء الاصطناعي الأرقام دون فهم الوحدات — مما يؤدي إلى استنتاجات خاطئة",correct:!0,explain:"بالضبط! الذكاء الاصطناعي يرى '50' من بئرين ويفترض أنهما نفس الشيء. فشل كبير في التنبؤ قادم."},{text:"ما عليك سوى اختيار وحدة واحدة وتجاهل الوحدات الأخرى",correct:!1,explain:"تجاهل 2 من 3 آبار يفقدك 66% من بياناتك. تحتاج إلى توحيد جميع المدخلات إلى وحدة واحدة."}]},{title:"Vibration Sensor Drift",titleAR:"مشكلة القيم المتطرفة",scenario:"Pump bearing vibration sensor reads 2.1 mm/s RMS for 3 months, then suddenly reads 0.3 mm/s for a week, then jumps back to 2.0 mm/s. A technician found a loose cable.",scenarioAR:"يسجل مستشعر درجة الحرارة 850 درجة مئوية للحظة واحدة على رأس بئر غاز (النطاق الطبيعي: 60-120 درجة مئوية).",question:"How does this affect AI predictions?",questionAR:"كيف يجب التعامل مع نقطة البيانات هذه قبل استخدامها في نموذج الذكاء الاصطناعي؟",options:[{text:"The AI learned that vibrations 'heal' — bad model",correct:!0,explain:"Yes! The AI sees vibration magically fix itself and 'learns' an impossible pattern. Future predictions become unreliable for that pump."},{text:"It only affects that one week of data",correct:!1,explain:"It affects the entire model. The AI's understanding of 'normal' vibration behavior gets corrupted by the false low readings."},{text:"AI automatically detects and ignores bad sensors",correct:!1,explain:"Some advanced AI can flag anomalies, but basic predictive models will be fooled. Always verify sensor health before trusting AI output."}],optionsAR:[{text:"احتفظ بها — قد تكون حقيقية",correct:!1,explain:"درجة حرارة 850 درجة مئوية فوق نقطة انصهار الألومنيوم. من المستحيل فيزيائياً لرأس بئر غاز. هذه ضوضاء مستشعر."},{text:"ضع علامة عليها كقيمة متطرفة وأزل أو استبدل بالمتوسط",correct:!0,explain:"صحيح! نقطة واحدة سيئة يمكن أن تحرف تنبؤات الذكاء الاصطناعي بشكل كبير. التنظيف المناسب للبيانات يمنع الإنذارات الكاذبة."},{text:"اضرب جميع القراءات في 2 لموازنتها",correct:!1,explain:"مضاعفة البيانات الجيدة للتعويض عن البيانات السيئة يدمر مجموعة البيانات بأكملها. هذه ليست الطريقة التي يعمل بها تنظيف البيانات."}]},{title:"Duplicate Maintenance Records",titleAR:"ملصقات مكررة",scenario:"A work order for 'bearing replacement P-101' appears 3 times in the CMMS export (same job, same date). The AI counts this as 3 separate bearing failures.",scenarioAR:"يظهر بئران كـ 'WH-07' في نظام وضع العلامات — أحدهما بئر ماء والآخر بئر نفط.",question:"What's the consequence?",questionAR:"ما هو التأثير على تدريب نموذج الذكاء الاصطناعي؟",options:[{text:"AI calculates MTBF as 3x shorter than reality",correct:!0,explain:"Right. Instead of 1 failure in 800 hours, the AI thinks there were 3 failures — predicting MTBF of 267 hours. Completely wrong maintenance planning."},{text:"Duplicates don't matter — AI averages it out",correct:!1,explain:"AI doesn't 'average out' duplicates. Each record is treated as a real failure event, skewing all reliability statistics."},{text:"The AI will ask the operator to verify",correct:!1,explain:"AI models don't question input data. They process whatever you feed them — duplicates, errors, and all. Data quality is a human responsibility."}],optionsAR:[{text:"يتعلم الذكاء الاصطناعي من بئرين مختلفين تماماً كما لو كانا بئراً واحداً — فشل النموذج",correct:!0,explain:"بالضبط! سيرى الذكاء الاصطناعي معدلات تدفق كبيرة (النفط) ومعدلات تدفق صغيرة (الماء) من 'نفس' البئر ويتعلم علاقات لا معنى لها."},{text:"يقوم الذكاء الاصطناعي تلقائياً باكتشاف الخطأ وإصلاحه",correct:!1,explain:"الذكاء الاصطناعي لا يمكنه معرفة أن الملصق خاطئ — إنه يثق في البيانات المقدمة. إنه يخلط بين بئرين ويعطي نتائج غير صحيحة."},{text:"الملصقات المكررة على ما يرام — البيانات تتحدث عن نفسها",correct:!1,explain:"البيانات لا يمكنها 'التحدث عن نفسها' عندما تكون التسميات خاطئة. هذا خطأ أساسي في البيانات يجب على البشر إصلاحه."}]},{title:"Outdated Equipment Tag",titleAR:"بيانات قديمة",scenario:"Pump P-101 was replaced with a new model (P-101B) 6 months ago. The dat
