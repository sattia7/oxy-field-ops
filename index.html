<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>مركز تحديات عمليات الذكاء الاصطناعي الميدانية</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <!-- Firebase SDK for cross-device real-time sync -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            field: {
              900: '#0b1220',
              800: '#111827',
              700: '#1f2937',
              600: '#374151',
              500: '#4b5563',
              accent: '#f59e0b',
              accentHover: '#d97706',
              success: '#10b981',
              danger: '#ef4444',
              info: '#3b82f6',
            }
          },
          fontFamily: {
            sans: ['Inter', 'Segoe UI', 'Roboto', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    * { -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0b1220;
      color: #e5e7eb;
      overflow-x: hidden;
      overscroll-behavior-y: none;
    }

    ::-webkit-scrollbar { width: 0px; background: transparent; }

    .card-enter {
      animation: slideUp 0.35s ease-out both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .btn-pulse:active { transform: scale(0.97); }

    .progress-stripe {
      background-image: linear-gradient(
        45deg,
        rgba(255,255,255,0.12) 25%,
        transparent 25%,
        transparent 50%,
        rgba(255,255,255,0.12) 50%,
        rgba(255,255,255,0.12) 75%,
        transparent 75%,
        transparent
      );
      background-size: 1rem 1rem;
      animation: moveStripe 1s linear infinite;
    }
    @keyframes moveStripe {
      from { background-position: 0 0; }
      to   { background-position: 1rem 0; }
    }

    .badge-glow {
      box-shadow: 0 0 12px rgba(245, 158, 11, 0.35);
    }

    .carousel-track {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      -webkit-scroll-snap-type: x mandatory;
      scroll-snap-type: x mandatory;
      touch-action: pan-x;
      padding-bottom: 1rem;
      scrollbar-width: none;
    }
    .carousel-track::-webkit-scrollbar { display: none; }
    .carousel-card {
      flex: 0 0 85%;
      -webkit-scroll-snap-align: center;
      scroll-snap-align: center;
    }

    .tool-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .tool-body.open {
      max-height: 800px;
    }

    .toast {
      animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
    }
    @keyframes toastIn {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    @keyframes toastOut {
      from { transform: translateY(0); opacity: 1; }
      to   { transform: translateY(100%); opacity: 1; }
    }

    .points-pop {
      animation: pop 0.5s ease-out forwards;
    }
    @keyframes pop {
      0%   { transform: scale(0.5); opacity: 0; }
      50%  { transform: scale(1.3); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .locked-overlay {
      background: rgba(11,18,32,0.75);
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
    }

    .mission-card.locked { opacity: 0.6; }
    .mission-card.unlocked { opacity: 1; }

    .swipe-hint {
      animation: swipeBounce 1.5s ease-in-out infinite;
    }
    @keyframes swipeBounce {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(12px); }
    }
    html[dir="rtl"] .swipe-hint { animation-name: swipeBounceRTL; }
    @keyframes swipeBounceRTL {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(-12px); }
    }

    /* Flip card for Jargon Buster */
    .flip-card {
      -webkit-perspective: 800px;
      perspective: 800px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .flip-card-inner {
      position: relative;
      width: 100%;
      transition: transform 0.5s ease;
      -webkit-transform-style: preserve-3d;
      transform-style: preserve-3d;
    }
    .flip-card.flipped .flip-card-inner {
      transform: rotateY(180deg);
    }
    .flip-card-front, .flip-card-back {
      position: relative;
      width: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .flip-card-back {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      transform: rotateY(180deg);
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      width: 8px; height: 8px;
      background: #f59e0b;
      top: -10px;
      z-index: 100;
      animation: confettiFall 3s ease-out forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* Shake for wrong answer */
    .shake {
      animation: shake 0.4s ease-in-out;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* Glow border for active choices */
    .choice-glow:hover {
      box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.25);
    }

    /* Profile Picker */
    .profile-avatar-option {
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .profile-avatar-option:hover, .profile-avatar-option.selected {
      border-color: #f59e0b !important;
      background: rgba(245,158,11,0.12);
      transform: scale(1.05);
    }
    .profile-avatar-option.selected {
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.4);
    }

    /* Dropdown Menu */
    .dropdown-menu {
      position: absolute;
      top: 100%;
      right: 0;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      min-width: 200px;
      padding: 8px;
      z-index: 100;
      animation: dropIn 0.2s ease-out;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Modal Overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn 0.2s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .modal-sheet {
      background: #111827;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUpModal 0.3s ease-out;
    }
    @keyframes slideUpModal {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    /* Trainer Dashboard */
    .trainer-tab {
      padding: 0.85rem 0.75rem;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
      min-height: 44px;
    }
    .trainer-tab.active {
      background: rgba(245,158,11,0.15);
      color: #f59e0b;
    }
    .trainer-tab:not(.active) {
      color: #6b7280;
    }
    .trainer-tab:not(.active):hover {
      color: #9ca3af;
    }

    .kpi-card {
      transition: transform 0.2s ease;
    }
    .kpi-card:hover {
      transform: translateY(-2px);
    }

    .activity-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .activity-dot.mission { background: #3b82f6; }
    .activity-dot.points { background: #f59e0b; }
    .activity-dot.badge { background: #10b981; }
    .activity-dot.login { background: #8b5cf6; }

    /* Safe area for bottom nav on notched devices */
    .pb-safe { padding-bottom: 8px; padding-bottom: env(safe-area-inset-bottom); }

    /* RTL Support */
    html[dir="rtl"] body { direction: rtl; text-align: right; font-family: 'Inter', 'Tajawal', sans-serif; }
    html[dir="rtl"] .fa-arrow-left:before { content: "\\f061"; font-family: 'Font Awesome 6 Free', 'Font Awesome 6 Brands', serif; font-weight: 900; }
    html[dir="rtl"] .fa-arrow-right:before { content: "\\f060"; font-family: 'Font Awesome 6 Free', 'Font Awesome 6 Brands', serif; font-weight: 900; }
    html[dir="rtl"] .fa-chevron-right:before { content: "\\f053"; font-family: 'Font Awesome 6 Free', 'Font Awesome 6 Brands', serif; font-weight: 900; }
    html[dir="rtl"] .fa-chevron-left:before { content: "\\f054"; font-family: 'Font Awesome 6 Free', 'Font Awesome 6 Brands', serif; font-weight: 900; }
    html[dir="rtl"] .space-x-reverse > :not([hidden]) ~ :not([hidden]) { --tw-space-x-reverse: 1; }
    html[dir="rtl"] .text-left { text-align: right; }
    html[dir="rtl"] .text-right { text-align: left; }
    html[dir="rtl"] .ml-auto { margin-left: 0; margin-right: auto; }
    html[dir="rtl"] .mr-auto { margin-right: 0; margin-left: auto; }
    html[dir="rtl"] .rounded-l-none { border-top-left-radius: 0; border-bottom-left-radius: 0; border-top-right-radius: inherit; border-bottom-right-radius: inherit; }
    html[dir="rtl"] .rounded-r-none { border-top-right-radius: 0; border-bottom-right-radius: 0; border-top-left-radius: inherit; border-bottom-left-radius: inherit; }
    html[dir="rtl"] .left-0 { left: auto; right: 0; }
    html[dir="rtl"] .right-0 { right: auto; left: 0; }
    html[dir="rtl"] .origin-top-right { transform-origin: top left; }
    html[dir="rtl"] .dropdown-menu { right: auto; left: 0; }
    html[dir="rtl"] .pr-2 { padding-right: 0.5rem; padding-left: 0; }
    html[dir="rtl"] .pl-3 { padding-left: 0; padding-right: 0.75rem; }
    html[dir="rtl"] [style*="text-align:left"] { text-align: right !important; }
    html[dir="rtl"] [style*="text-align:right"] { text-align: left !important; }
  </style>
</head>

    <div class="flex items-center gap-2">

<script>
/* ============================================================
   I18N — Arabic Localization
   ============================================================ */
let CURRENT_LANG = localStorage.getItem('aiFieldOpsLang') || 'en';
const I18N = {
  // Header & Navigation
  appTitle: { en:'AI Field Ops', ar:'عمليات الذكاء الاصطناعي الميدانية' },
  appSubtitle: { en:'SLB → OXY Training', ar:'SLB → OXY تدريب' },
  navHub: { en:'Hub', ar:'الرئيسية' },
  navMissions: { en:'Missions', ar:'المهام' },
  navAwards: { en:'Awards', ar:'الجوائز' },
  navTrainer: { en:'Trainer', ar:'المدرب' },
  workshopProgress: { en:'Workshop Progress', ar:'تقدم الورشة' },
  streakDays: { en:'day streak', ar:'أيام متتالية' },
  signOut: { en:'Sign Out', ar:'تسجيل الخروج' },

// Language helpers
function t(key, replacements) {
  const entry = I18N[key];
  if (!entry) return key;
  let text = entry[CURRENT_LANG] || entry['en'] || key;
  if (replacements) {
    Object.keys(replacements).forEach(k => {
      text = text.replace('{' + k + '}', replacements[k]);
    });
  }
  return text;
}

function setLanguage(lang) {
  CURRENT_LANG = lang;
  localStorage.setItem('aiFieldOpsLang', lang);
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.title = t('appTitle');
  updateStaticText();
  // Re-render current view
  if (state.view === 'home' || state.view === 'missions') goMissions();
  else if (state.view === 'trainer') renderTrainerDashboard();
  else if (activeUserId) goMissions();
  else showProfilePicker();
}

function updateStaticText() {
  const el = (id, key) => { const e = document.getElementById(id); if (e) e.textContent = t(key); };
  el('headerTitle', 'appTitle');
  el('headerSubtitle', 'appSubtitle');
  el('navHubLabel', 'navHub');
  el('navMissionsLabel', 'navMissions');
  el('navAwardsLabel', 'navAwards');
  el('navTrainerLabel', 'navTrainer');
  el('headerName', 'welcome');
  el('progressLabel', 'workshopProgress');
  el('ddSwitchProfile', 'switchProfile');
  el('ddMyAwards', 'myAwards');
  el('ddTrainerDashboard', 'trainerDashboardMenu');
  el('ddSignOut', 'signOut');
  const streakWrapper = document.getElementById('streakWrapper');
  if (streakWrapper) streakWrapper.title = t('currentStreakLabel');
  const trainerBtn = document.getElementById('trainerQuickBtn');
  if (trainerBtn) {
    trainerBtn.innerHTML = `<i class="fa-solid fa-chart-simple"></i> ${t('navTrainer')}`;
  }
  document.getElementById('langSwitcher').innerHTML = langSwitchHTML();
}

function langSwitchHTML() {
  const isAr = CURRENT_LANG === 'ar';
  return `<button onclick="setLanguage('${isAr?'en':'ar'}')" class="flex items-center gap-1 bg-field-800 border border-field-700 rounded-md px-2 py-1 text-[10px] font-bold text-gray-300 hover:border-field-accent hover:text-field-accent transition shrink-0" title="${isAr?'Switch to English':'التبديل للعربية'}">
    <i class="fa-solid fa-language text-xs"></i> ${isAr?'EN':'عربي'}
  </button>`;
}

let db = null;

const DB_ROOT = 'oxy_field_ops';

function initSync() {
  console.log('[Sync] initSync() called, readyState:', document.readyState);
  // Skip if placeholder config
  if (!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey.indexOf('YOUR') === 0) {
    console.log('[Sync] Firebase not configured — local-only mode');

  }
  try {

    syncEnabled = true;
    console.log('[Sync] Firebase real-time sync active');

    // Real-time listener for missionLocks so trainers' changes propagate instantly
    const missionLocksRef = db.ref(`${DB_ROOT}/missionLocks`);
    missionLocksRef.on('value', snap => {
      const val = snap.val();
      console.log('[Sync] missionLocks listener fired, val:', val);
      if (val !== null && val !== undefined) {

      }
    });

  } catch(e) {
    console.error('[Sync] Firebase init failed:', e);
  }

function pullAllRemoteData() {
  if (!db) return;
  const paths = ['users','states','activeGroup','activities','archivedGroups','missionLocks'];
  const lsKeys = ['aiFieldOpsUsers','aiFieldOpsStates','aiFieldOpsActiveGroup','aiFieldOpsActivities','aiFieldOpsArchivedGroups','aiFieldOpsMissionLocks'];
  paths.forEach((path, i) => {
    db.ref(`${DB_ROOT}/${path}`).once('value').then(snap => {
      const val = snap.val();
      if (val !== null && val !== undefined) {
        localStorage.setItem(lsKeys[i], JSON.stringify(val));
        console.log(`[Sync] Pulled ${path}`);
      }
    }).catch(() => {});
  });
}

function syncPush(path, data) {
  if (!syncEnabled || !db || syncPaused) {
    console.log(`[Sync] Push skipped for ${path}: syncEnabled=${syncEnabled}, db=${!!db}, syncPaused=${syncPaused}`);
    return;
  }
  db.ref(`${DB_ROOT}/${path}`).set(data)
    .then(() => console.log(`[Sync] Pushed ${path}`))
    .catch(err => console.error(`[Sync] Push failed for ${path}:`, err));
}

function pullRemoteData(callback) {
  if (!syncEnabled || !db) { if (callback) callback(); return; }
  showToast(t('syncingData') || 'Syncing data...', 'info');
  const paths = [
    { path: 'users', lsKey: 'aiFieldOpsUsers' },
    { path: 'states', lsKey: 'aiFieldOpsStates' },
    { path: 'activeGroup', lsKey: 'aiFieldOpsActiveGroup' },
    { path: 'activities', lsKey: 'aiFieldOpsActivities' },
    { path: 'archivedGroups', lsKey: 'aiFieldOpsArchivedGroups' },
    { path: 'missionLocks', lsKey: 'aiFieldOpsMissionLocks' }
  ];
  let completed = 0;
  paths.forEach(item => {
    db.ref(`${DB_ROOT}/${item.path}`).once('value').then(snap => {
      const val = snap.val();
      if (val !== null && val !== undefined) {
        localStorage.setItem(item.lsKey, JSON.stringify(val));
      }
      completed++;
      if (completed === paths.length) {
        showToast(t('syncComplete') || 'Data refreshed!', 'success');
        if (state.view === 'trainer') renderTrainerDashboard();
        if (callback) callback();
      }
    }).catch(() => {
      completed++;
      if (completed === paths.length && callback) callback();
    });
  });
}

function switchToUser(uid) {
  const users = getUsers();
  const targetUser = users.find(u => u.id === uid);
  const currentUser = getCurrentUser();
  const isTrainer = currentUser && currentUser.role === 'trainer';

  // Non-trainers can only switch to themselves
  if (currentUser && !isTrainer && uid !== activeUserId) {
    showToast(t('lockedBtn'), 'error');
    return;
  }

  if (activeUserId) saveState(); // Save current user's state before switching
  if (targetUser && targetUser.role === 'trainer') {
    showTrainerLogin();
    return;
  }
  setActiveUserId(uid);
  state = createFreshState();
  loadState();
  updateHeaderUser();
  updateNavVisibility();
  goMissions();
  showToast(t('welcomeBackUser', {name: targetUser ? escHtml(targetUser.name) : t('userDefault')}), 'info');
}

function logoutUser() {
  // Only remove trainer from user list if current user IS the trainer
  const currentUser = getCurrentUser();
  if (currentUser && currentUser.role === 'trainer') {
    const users = getUsers();
    const trainerIdx = users.findIndex(u => u.role === 'trainer');
    if (trainerIdx >= 0) { users.splice(trainerIdx, 1); setUsers(users); }
  }
  if (activeUserId) saveState();
  setActiveUserId(null);
  state = createFreshState();
  activeUserId = null;
  document.getElementById('userDropdown').classList.add('hidden');
  updateNavVisibility();
  showProfilePicker();
}

function getCurrentUser() {
  if (!activeUserId) return null;
  const users = getUsers();
  return users.find(u => u.id === activeUserId) || null;
}

function hasTrainerAccess() {
  const user = getCurrentUser();
  return user && user.role === 'trainer';
}

function updateStreak() {
  const today = new Date().toDateString();
  const last = state.lastActive ? new Date(state.lastActive).toDateString() : null;
  if (last === today) return;
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  if (last === yesterday.toDateString()) { state.streak++; }
  else { state.streak = 1; }
  state.lastActive = new Date().toISOString();
  saveState();
  renderStreak();
}

function addPoints(n, reason) {
  state.points += n;
  if (!state.pointLog) state.pointLog = [];
  state.pointLog.push({ amount: n, reason: reason, timestamp: new Date().toISOString() });
  saveState();
  renderPoints();
  showToast(t('ptsDashReason', {n, reason}), 'success');
  logActivity('points_added', reason, n);
}

function markComplete(id, score, scoreMax) {
  if (!state.completed.has(id)) {
    state.completed.add(id);
    if (!state.missionHistory) state.missionHistory = {};
    if (!state.missionHistory[id]) state.missionHistory[id] = {};
    state.missionHistory[id].completedAt = new Date().toISOString();
    state.missionHistory[id].attempts = (state.missionHistory[id].attempts || 0) + 1;
    saveState();
    renderProgress();
    logActivity('mission_complete', t('completedMissionLog', {id}), 0);
    showToast(t('missionComplete'), 'success');
  }
  if (score !== undefined) recordMissionScore(id, score, scoreMax);
}

function markMissionAttempt(id) {
  if (!state.missionHistory) state.missionHistory = {};
  if (!state.missionHistory[id]) state.missionHistory[id] = {};
  state.missionHistory[id].attempts = (state.missionHistory[id].attempts || 0) + 1;
  saveState();
}

function recordMissionScore(id, score, scoreMax) {
  if (!state.missionHistory) state.missionHistory = {};
  if (!state.missionHistory[id]) state.missionHistory[id] = {};
  state.missionHistory[id].score = score;
  state.missionHistory[id].scoreMax = scoreMax;
  saveState();
}

function awardBadge(id, title) {
  if (!state.badges.has(id)) {
    state.badges.add(id);
    if (!state.badgeHistory) state.badgeHistory = {};
    state.badgeHistory[id] = { earnedAt: new Date().toISOString(), title: title };
    saveState();
    playSound('badge');
    showToast(t('badgeUnlockedToast', {title}), 'badge');
    fireConfetti(15);
    logActivity('badge_earned', title, 0);
  }
}

function fireConfetti(count=30) {
  const colors = ['#f59e0b', '#10b981', '#3b82f6', '#ef4444', '#8b5cf6'];
  for (let i=0; i<count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDuration = (2 + Math.random() * 2) + 's';
    el.style.width = (6 + Math.random() * 6) + 'px';
    el.style.height = (6 + Math.random() * 6) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

let soundEnabled = true;
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new AudioCtx();
  return _audioCtx;
}

function playSound(type) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);

    if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, ctx.currentTime); // C5
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1); // E5
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.setValueAtTime(150, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    } else if (type === 'badge') {
      // Fanfare: ascending arpeggio
      [523, 659, 784, 1047].forEach((freq, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.12);
        g.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.12);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.12 + 0.3);
        o.start(ctx.currentTime + i * 0.12);
        o.stop(ctx.currentTime + i * 0.12 + 0.3);
      });
    } else if (type === 'click') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      gain.gain.setValueAtTime(0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.08);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.08);
    } else if (type === 'complete') {
      // Mission complete: two-tone ascending
      const o1 = ctx.createOscillator(), g1 = ctx.createGain();
      o1.connect(g1); g1.connect(ctx.destination);
      o1.type = 'sine';
      o1.frequency.setValueAtTime(523, ctx.currentTime);
      g1.gain.setValueAtTime(0.12, ctx.currentTime);
      g1.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
      o1.start(ctx.currentTime); o1.stop(ctx.currentTime + 0.2);
      const o2 = ctx.createOscillator(), g2 = ctx.createGain();
      o2.connect(g2); g2.connect(ctx.destination);
      o2.type = 'sine';
      o2.frequency.setValueAtTime(784, ctx.currentTime + 0.15);
      g2.gain.setValueAtTime(0.12, ctx.currentTime + 0.15);
      g2.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
      o2.start(ctx.currentTime + 0.15); o2.stop(ctx.currentTime + 0.35);
    }
  } catch(e) { /* Audio not supported — silent fallback */ }
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  localStorage.setItem('aiFieldOpsSound', soundEnabled ? 'on' : 'off');
  showToast(soundEnabled ? t('soundOn') : t('soundOff'), 'info');
}

/* ============================================================
   TOAST
   ============================================================ */
function showToast(msg, type='info') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  const colors = {
    success: 'bg-emerald-500/20 border-emerald-500/40 text-emerald-300',
    badge:   'bg-amber-500/20 border-amber-500/40 text-amber-300',
    info:    'bg-sky-500/20 border-sky-500/40 text-sky-300',
    error:   'bg-rose-500/20 border-rose-500/40 text-rose-300',
  };
  const colorClass = colors[type] || colors.info;
  el.className = `toast pointer-events-auto px-3 py-2.5 rounded-lg border text-sm font-semibold flex items-center gap-2 ${colorClass}`;
  const icons = { success:'fa-circle-check', badge:'fa-medal', info:'fa-circle-info', error:'fa-triangle-exclamation' };
  el.innerHTML = `<i class="fa-solid ${icons[type] || icons.info}"></i> ${escHtml(msg)}`;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3300);
}

      aiorhumanIndex: 0, aiorhumanScore: 0,
      promptBonusAwarded: false,
      aitoolsIndex: 0, aitoolsVotes: [],

function executeResetDatabase() {
  localStorage.removeItem('aiFieldOpsUsers');
  localStorage.removeItem('aiFieldOpsStates');
  localStorage.removeItem('aiFieldOpsActivities');
  localStorage.removeItem('aiFieldOpsActiveUser');
  localStorage.removeItem('aiFieldOpsState'); // legacy too
  localStorage.removeItem('aiFieldOpsActiveGroup');
  localStorage.removeItem('aiFieldOpsArchivedGroups');
  localStorage.removeItem('aiFieldOpsMissionLocks');
  setActiveUserId(null);
  state = createFreshState();
  activeUserId = null;
  updateNavVisibility();
  showToast(t('allDataErased'), 'info');
  showProfilePicker();
}

/* ============================================================
   DETAILED REPORT GENERATOR
   ============================================================ */
function generateDetailedReport() {
  const activeGroup = getActiveGroup();
  const users = getUsers().filter(u => u.role !== 'trainer' && (u.group || 1) === activeGroup.id);
  const allStates = getAllStates();
  const activities = getActivities();
  const now = new Date().toLocaleString();

  if (!users.length) {
    showToast(t('noUserData'), 'info');
    return;
  }

  const missionNames = { myth:t('mythTitle'), whatis:t('whatisTitle'), jargon:t('jargonTitle'), caps:t('capsTitle'), aiorhuman:t('aiorhumanTitle'), safety:t('safetyTitle'), prompt:t('promptTitle'), aitools:t('aitoolsTitle'), group:t('groupTitle'), gallery:t('galleryTitle'), speedround:t('speedroundTitle'), wish:t('wishTitle'), final:t('finalTitle') };
  const badgeNames = { mythbuster:t('mythBusterTitle'), jargonmaster:t('jargonMasterTitle'), aidetective:t('aiDetectiveTitle'), prompteng:t('promptEngineerTitle'), safetyexpert:t('safetyExpertTitle'), fieldai:t('fieldAIOperatorTitle'), graduate:t('fieldAIGraduateTitle') };

  let reportSections = '';

  users.forEach((u, idx) => {
    const s = allStates[u.id] || {};
    const userActs = activities.filter(a => a.userId === u.id);
    const completed = (s.completed || []);
    const badges = (s.badges || []);
    const missionHist = s.missionHistory || {};
    const badgeHist = s.badgeHistory || {};
    const pointLog = s.pointLog || [];
    const pct = Math.round((completed.length / MISSION_ORDER.length) * 100);
    const totalPoints = s.points || 0;
    const streak = s.streak || 0;
    const loginCount = s.loginCount || 0;
    const lastActive = s.lastActive ? fmtDateTime(s.lastActive) : t('never');
    const createdAt = u.createdAt ? fmtDateTime(u.createdAt) : t('unknown');

    // Point breakdown
    const totalFromLog = pointLog.reduce((sum, p) => sum + (p.amount || 0), 0);
    const pointEvents = pointLog.length;
    let pointLogHtml = '';
    if (pointLog.length > 0) {
      pointLogHtml = pointLog.slice(0, 50).map(p => `
        <tr><td style="padding:4px 8px;border-bottom:1px solid #374151;font-size:11px;color:#9ca3af">${fmtDateTime(p.timestamp)}</td><td style="padding:4px 8px;border-bottom:1px solid #374151;font-size:11px;color:#f59e0b;text-align:right;font-weight:bold"><span dir="ltr">+${p.amount}</span></td><td style="padding:4px 8px;border-bottom:1px solid #374151;font-size:11px;color:#d1d5db">${p.reason || ''}</td></tr>
      `).join('');
    }

    // Mission details
    let missionHtml = '';
    Object.entries(missionNames).forEach(([id, title]) => {
      const isDone = completed.includes(id);
      const hist = missionHist[id] || {};
      const scoreStr = hist.score !== undefined ? `<span dir="ltr">${hist.score}/${hist.scoreMax||'?'}</span>` : '';
      const dateStr = hist.completedAt ? fmtDate(hist.completedAt) : '';
      const attempts = hist.attempts || (isDone ? 1 : 0);
      missionHtml += `
        <tr>
          <td style="padding:4px 8px;border-bottom:1px solid #1f2937;font-size:11px;color:${isDone?'#10b981':'#6b7280'}">${title}</td>
          <td style="padding:4px 8px;border-bottom:1px solid #1f2937;font-size:11px;color:${isDone?'#10b981':'#6b7280'};text-align:center">${isDone?'✅':'❌'}</td>
          <td style="padding:4px 8px;border-bottom:1px solid #1f2937;font-size:11px;color:#d1d5db;text-align:center">${scoreStr||'—'}</td>
          <td style="padding:4px 8px;border-bottom:1px solid #1f2937;font-size:11px;color:#9ca3af;text-align:center">${attempts}</td>
          <td style="padding:4px 8px;border-bottom:1px solid #1f2937;font-size:11px;color:#9ca3af">${dateStr||'—'}</td>
        </tr>`;
    });

    // Badge details
    let badgeHtml = '';
    Object.entries(badgeNames).forEach(([id, title]) => {
      const earned = badges.includes(id);
      const hist = badgeHist[id] || {};
      const dateStr = hist.earnedAt ? fmtDate(hist.earnedAt) : '';
      badgeHtml += `
        <tr>
          <td style="padding:4px 8px;border-bottom:1px solid #1f2937;font-size:11px;color:${earned?'#f59e0b':'#6b7280'}">${earned?'🏅':'🔒'} ${title}</td>
          <td style="padding:4px 8px;border-bottom:1px solid #1f2937;font-size:11px;color:${earned?'#10b981':'#6b7280'}">${earned?t('earned'):t('notYet')}</td>
          <td style="padding:4px 8px;border-bottom:1px solid #1f2937;font-size:11px;color:#9ca3af">${dateStr||'—'}</td>
        </tr>`;
    });

    // Activity timeline
    let activityHtml = '';
    if (userActs.length > 0) {
      activityHtml = userActs.slice(0, 30).map(a => {
        const typeLabel = { mission_complete:t('typeMission'), points_added:t('typePoints'), badge_earned:t('typeBadge'), login:t('typeLogin') };
        const typeColor = { mission_complete:'#3b82f6', points_added:'#f59e0b', badge_earned:'#10b981', login:'#8b5cf6' };
        return `
        <tr>
          <td style="padding:3px 8px;border-bottom:1px solid #1f2937;font-size:10px;color:#9ca3af">${fmtDateTime(a.timestamp)}</td>
          <td style="padding:3px 8px;border-bottom:1px solid #1f2937;font-size:10px;color:${typeColor[a.type]||'#d1d5db'};font-weight:bold">${typeLabel[a.type]||a.type}</td>
          <td style="padding:3px 8px;border-bottom:1px solid #1f2937;font-size:10px;color:#d1d5db">${a.details}</td>
          <td style="padding:3px 8px;border-bottom:1px solid #1f2937;font-size:10px;color:#f59e0b;text-align:right">${a.points?'+'+a.points:''}</td>
        </tr>`;
      }).join('');
    }

    reportSections += `
    <div style="margin-bottom:30px;padding:20px;background:#111827;border:1px solid #374151;border-radius:12px;page-break-inside:avoid">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #f59e0b33">
        <span style="font-size:32px">${u.avatar}</span>
        <div>
          <h2 style="margin:0;color:#fff;font-size:18px">${u.name}</h2>
          <p style="margin:2px 0 0;color:#9ca3af;font-size:12px">${getPositionDisplay(u.position)} • ${t('joined')} ${createdAt}</p>
        </div>
        <div style="margin-left:auto;text-align:right">
          <p style="margin:0;color:#f59e0b;font-size:20px;font-weight:bold">${totalPoints} ${t('pts')}</p>
          <p style="margin:0;color:#9ca3af;font-size:11px"><span dir="ltr">${pct}%</span> ${t('doneKPI')}</p>
        </div>
      </div>

      <!-- Summary Cards -->
      <table style="width:100%;border-collapse:collapse;margin-bottom:16px;border:1px solid #1f2937;border-radius:8px;overflow:hidden">
        <tr>
          <td style="padding:8px 12px;background:#1f2937;color:#9ca3af;font-size:10px;text-transform:uppercase;letter-spacing:0.5px">${t('missionsDone')}</td>
          <td style="padding:8px 12px;background:#1f2937;color:#9ca3af;font-size:10px;text-transform:uppercase;letter-spacing:0.5px">${t('quizScore')}</td>
          <td style="padding:8px 12px;background:#1f2937;color:#9ca3af;font-size:10px;text-transform:uppercase;letter-spacing:0.5px">${t('badgesCol')}</td>
          <td style="padding:8px 12px;background:#1f2937;color:#9ca3af;font-size:10px;text-transform:uppercase;letter-spacing:0.5px">${t('streakCol')}</td>
          <td style="padding:8px 12px;background:#1f2937;color:#9ca3af;font-size:10px;text-transform:uppercase;letter-spacing:0.5px">${t('logins')}</td>
          <td style="padding:8px 12px;background:#1f2937;color:#9ca3af;font-size:10px;text-transform:uppercase;letter-spacing:0.5px">${t('lastActiveCol')}</td>
          <td style="padding:8px 12px;background:#1f2937;color:#9ca3af;font-size:10px;text-transform:uppercase;letter-spacing:0.5px">${t('ptEvents')}</td>
        </tr>
        <tr>
          <td style="padding:8px 12px;color:#fff;font-size:14px;font-weight:bold"><span dir="ltr">${completed.length}/${MISSION_ORDER.length}</span></td>
          <td style="padding:8px 12px;color:#e11d48;font-size:14px;font-weight:bold"><span dir="ltr">${s.quizScore||0}/${QUIZ.length}</span></td>
          <td style="padding:8px 12px;color:#10b981;font-size:14px;font-weight:bold"><span dir="ltr">${badges.length}/${ALL_BADGE_IDS.length}</span></td>
          <td style="padding:8px 12px;color:#f97316;font-size:14px;font-weight:bold">🔥 ${streak}</td>
          <td style="padding:8px 12px;color:#fff;font-size:14px;font-weight:bold">${loginCount}</td>
          <td style="padding:8px 12px;color:#9ca3af;font-size:11px">${lastActive}</td>
          <td style="padding:8px 12px;color:#fff;font-size:14px;font-weight:bold">${pointEvents}</td>
        </tr>
      </table>

      <!-- Mission Details -->
      <h3 style="color:#f59e0b;font-size:13px;margin:0 0 6px">${t('missionDetails')}</h3>

/* ============================================================
   CSV EXPORT
   ============================================================ */
function exportCSV() {
  const activeGroup = getActiveGroup();
  const users = getUsers().filter(u => u.role !== 'trainer' && (u.group || 1) === activeGroup.id);
  const allStates = getAllStates();
  const activities = getActivities();

  if (!users.length) {
    showToast(t('noUserData'), 'info');
    return;
  }

  // 1. Users CSV
  let usersCSV = t('csvUsersHeader') + '\n';
  users.forEach(u => {
    const s = allStates[u.id] || {};
    usersCSV += `"${u.id}","${u.name}","${u.avatar}","${u.position}","${u.role}",${u.group||1},"${u.createdAt}",${s.points||0},${(s.completed||[]).length},${(s.badges||[]).length},${s.quizScore||0},${s.streak||0},${s.loginCount||0},"${s.lastActive||''}"\n`;
  });

  // 2. Mission History CSV
  const missionIds = ['myth','whatis','jargon','caps','aiorhuman','safety','prompt','aitools','group','gallery','wish','speedround','final'];
  const missionTitles = [t('mythTitle'),t('whatisTitle'),t('jargonTitle'),t('capsTitle'),t('aiorhumanTitle'),t('safetyTitle'),t('promptTitle'),t('aitoolsTitle'),t('groupTitle'),t('galleryTitle'),t('wishTitle'),t('speedroundTitle'),t('finalTitle')];
  let missionsCSV = t('csvMissionHeader') + '\n';
  users.forEach(u => {
    const s = allStates[u.id] || {};
    const mh = s.missionHistory || {};
    missionIds.forEach((mid, i) => {
      const done = (s.completed || []).includes(mid);
      const hist = mh[mid] || {};
      missionsCSV += `"${u.id}","${u.name}","${missionTitles[i]}","${done?t('csvYes'):t('csvNo')}",${hist.score||''},${hist.scoreMax||''},${hist.attempts||(done?1:0)},"${hist.completedAt||''}"\n`;
    });
  });

  // 3. ${t('activities')} CSV
  let actCSV = t('csvActivityHeader') + '\n';
  const userActs = activities.filter(a => users.some(u => u.id === a.userId));
  userActs.forEach(a => {
    const u = users.find(x => x.id === a.userId);
    actCSV += `"${a.id}","${a.userId}","${u?u.name:t('unknown')}","${({mission_complete:t('typeMission'),points_added:t('typePoints'),badge_earned:t('typeBadge'),login:t('typeLogin')})[a.type]||a.type}","${a.details}",${a.points||0},"${a.timestamp}"\n`;
  });

  // Download all CSVs
  downloadCSVFile(t('usersFilename'), usersCSV);
  setTimeout(() => downloadCSVFile(t('missionHistoryFilename'), missionsCSV), 200);
  setTimeout(() => downloadCSVFile(t('activitiesFilename'), actCSV), 400);

  showToast(t('csvExported', {count: users.length}), 'success');
}

function downloadCSVFile(filename, content) {
  const blob = new Blob(['﻿' + content], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

/* ============================================================
   GROUP PERFORMANCE REPORT
   ============================================================ */
function generateGroupReport() {
  const activeGroup = getActiveGroup();
  const users = getUsers().filter(u => u.role !== 'trainer' && (u.group || 1) === activeGroup.id);
  const allStates = getAllStates();
  const activities = getActivities();
  const now = new Date().toLocaleString();

  if (!users.length) {
    showToast(t('noUserDataGroup'), 'info');
    return;
  }

  const totalUsers = users.length;
  const totalPoints = users.reduce((s,u) => s + (allStates[u.id]?.points||0), 0);
  const avgPoints = Math.round(totalPoints / totalUsers);
  const totalBadges = users.reduce((s,u) => s + (allStates[u.id]?.badges?.length||0), 0);
  const totalMissions = users.reduce((s,u) => s + (allStates[u.id]?.completed?.length||0), 0);
  const overallPct = Math.round((totalMissions / (totalUsers * MISSION_ORDER.length)) * 100);
  const totalQuizScore = users.reduce((s,u) => s + (allStates[u.id]?.quizScore||0), 0);
  const avgQuizScore = users.length ? (totalQuizScore / users.length).toFixed(1) : 0;

  // Top performers
  const ranked = users.map(u => ({...u, points: allStates[u.id]?.points||0, completed: (allStates[u.id]?.completed||[]).length, badges: (allStates[u.id]?.badges||[]).length, streak: allStates[u.id]?.streak||0, quizScore: allStates[u.id]?.quizScore||0})).sort((a,b) => b.points - a.points);
  const top3 = ranked.slice(0, 3);

  // Streak stats
  const avgStreak = Math.round(users.reduce((s,u) => s + (allStates[u.id]?.streak||0), 0) / totalUsers);
  const maxStreak = Math.max(...users.map(u => allStates[u.id]?.streak||0));
  const activeToday = users.filter(u => { const s = allStates[u.id]; return s?.lastActive && new Date(s.lastActive).toDateString() === new Date().toDateString(); }).length;

  // Mission heat map
  const missionIds = ['myth','whatis','jargon','caps','aiorhuman','safety','prompt','aitools','group','gallery','wish','speedround','final'];
  const missionTitles = [t('mythTitle'),t('whatisTitle'),t('jargonTitle'),t('capsTitle'),t('aiorhumanTitle'),t('safetyTitle'),t('promptTitle'),t('aitoolsTitle'),t('groupTitle'),t('galleryTitle'),t('wishTitle'),t('speedroundTitle'),t('finalTitle')];
  const missionCounts = missionIds.map(id => users.filter(u => (allStates[u.id]?.completed||[]).includes(id)).length);
  const mostCompleted = missionTitles[missionCounts.indexOf(Math.max(...missionCounts))];
  const leastCompleted = missionTitles[missionCounts.indexOf(Math.min(...missionCounts))];

  // Badge heat map
  const badgeIds = ['mythbuster','jargonmaster','aidetective','prompteng','safetyexpert','fieldai','graduate'];
  const badgeTitles = [t('mythBusterTitle'),t('jargonMasterTitle'),t('aiDetectiveTitle'),t('promptEngineerTitle'),t('safetyExpertTitle'),t('fieldAIOperatorTitle'),t('fieldAIGraduateTitle')];
  const badgeCounts = badgeIds.map(id => users.filter(u => (allStates[u.id]?.badges||[]).includes(id)).length);
  const mostEarned = badgeTitles[badgeCounts.indexOf(Math.max(...badgeCounts))];
  const leastEarned = badgeTitles[badgeCounts.indexOf(Math.min(...badgeCounts))];

  // Activity stats
  const userActs = activities.filter(a => users.some(u => u.id === a.userId));
  const totalActs = userActs.length;
  const actsPerUser = Math.round(totalActs / totalUsers);
  const missionActs = userActs.filter(a => a.type === 'mission_complete').length;
  const badgeActs = userActs.filter(a => a.type === 'badge_earned').length;
  const pointActs = userActs.filter(a => a.type === 'points_added').length;

  // Completion distribution
  const completed = users.filter(u => (allStates[u.id]?.completed||[]).length >= MISSION_ORDER.length).length;

  // Performance assessment
  let perfAssessment = '';

</body>
</html>`;

  const blob = new Blob([reportHTML], { type: 'text/html' });

  const a = document.createElement('a');
  a.href = url;
  a.download = `${t('groupReportFilenamePrefix')}_${new Date().toISOString().slice(0,10)}.html`;
  document.body.appendChild(a);

  a.remove();
  URL.revokeObjectURL(url);

}

function renderTrainerUsersTable() {
  const users = getUsers().filter(u => u.role !== 'trainer');
  const allStates = getAllStates();
  const activeGroup = getActiveGroup();
  const archivedGroups = getArchivedGroups();

  if (!users.length) {
    return `<div class="text-center py-8"><p class="text-sm text-gray-400">${t('noUsers')}</p><p class="text-xs text-gray-500 mt-1">${t('usersAppearHere')}</p></div>`;
  }

  return `
    <div class="mb-3 flex items-center gap-2 flex-wrap">
      <button onclick="window._userGroupFilter='all'; renderTrainerDashboard();" class="px-2.5 py-1 rounded-lg text-[10px] font-bold ${!window._userGroupFilter||window._userGroupFilter==='all'?'bg-field-accent text-field-900':'bg-field-700 text-gray-300'} transition">${t('allGroups')}</button>
      <button onclick="window._userGroupFilter='active'; renderTrainerDashboard();" class="px-2.5 py-1 rounded-lg text-[10px] font-bold ${window._userGroupFilter==='active'?'bg-field-accent text-field-900':'bg-field-700 text-gray-300'} transition">${activeGroup.name}</button>
      ${archivedGroups.map(g => `
        <button onclick="window._userGroupFilter='${g.id}'; renderTrainerDashboard();" class="px-2.5 py-1 rounded-lg text-[10px] font-bold ${window._userGroupFilter===''+g.id?'bg-field-accent text-field-900':'bg-field-700 text-gray-300'} transition">${g.name}</button>
      `).join('')}
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-left">
        <thead>
          <tr class="border-b border-field-700 text-[10px] text-gray-400 uppercase tracking-wider">
            <th class="pb-2 pr-2">${t('userCol')}</th>
            <th class="pb-2 pr-2">${t('positionCol')}</th>
            <th class="pb-2 pr-2 text-center">${t('groupCol')}</th>
            <th class="pb-2 pr-2 text-center">${t('pointsCol')}</th>
            <th class="pb-2 pr-2 text-center">${t('badgesCol')}</th>
            <th class="pb-2 pr-2 text-center">${t('doneCol')}</th>
            <th class="pb-2 pr-2 text-center">${t('quizCol')}</th>
            <th class="pb-2 pr-2 text-center">${t('streakCol')}</th>
            <th class="pb-2">${t('lastActiveCol')}</th>
          </tr>
        </thead>
        <tbody>
          ${users.map(u => {
            const userGroup = u.group || 1;
            const filter = window._userGroupFilter;
            if (filter && filter !== 'all') {
              if (filter === 'active' && userGroup !== activeGroup.id) return '';
              if (filter !== 'active' && String(userGroup) !== filter) return '';
            }
            const s = allStates[u.id] || {};
            const completed = (s.completed || []).length;
            const badges = (s.badges || []).length;
            const quizScore = s.quizScore || 0;
            const pct = Math.round((completed / MISSION_ORDER.length) * 100);
            const lastActive = s.lastActive ? new Date(s.lastActive) : null;
            const isToday = lastActive && lastActive.toDateString() === new Date().toDateString();
            const groupName = userGroup === activeGroup.id ? activeGroup.name : (archivedGroups.find(g => g.id === userGroup)?.name || t('groupLabel') + ' ' + userGroup);
            return `
            <tr class="border-b border-field-800 hover:bg-field-800/50 transition">
              <td class="py-2.5 pr-2">
                <div class="flex items-center gap-2">
                  <span class="text-lg">${u.avatar}</span>
                  <span class="text-xs font-bold text-white truncate max-w-[90px]">${escHtml(u.name)}</span>
                  ${isToday?`<span class="w-1.5 h-1.5 rounded-full bg-emerald-400" title="${t('activeTodayTooltip')}"></span>`:''}
                </div>
              </td>
              <td class="py-2.5 pr-2 text-[11px] text-gray-400">${escHtml(getPositionDisplay(u.position))}</td>
              <td class="py-2.5 pr-2 text-center text-[10px] text-gray-400">${groupName}</td>
              <td class="py-2.5 pr-2 text-center text-xs font-bold text-field-accent">${s.points||0}</td>
              <td class="py-2.5 pr-2 text-center text-xs font-bold text-emerald-400">${badges}</td>
              <td class="py-2.5 pr-2 text-center">
                <div class="flex items-center gap-1 justify-center">
                  <span class="text-[11px] font-bold ${pct>=60?'text-emerald-400':pct>=30?'text-amber-400':'text-gray-400'}"><span dir="ltr">${completed}/${MISSION_ORDER.length}</span></span>
                  <span class="text-[10px] text-gray-500">(<span dir="ltr">${pct}%</span>)</span>
                </div>
              </td>
              <td class="py-2.5 pr-2 text-center text-xs font-bold ${quizScore>=QUIZ_PASSING_SCORE?'text-emerald-400':quizScore>0?'text-amber-400':'text-gray-500'}"><span dir="ltr">${quizScore}/${QUIZ.length}</span></td>

              <td class="py-2.5 text-[11px] text-gray-400">${lastActive ? timeAgo(lastActive.toISOString()) : t('never')}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderTrainerAnalytics() {
  const activeGroup = getActiveGroup();
  const users = getUsers().filter(u => u.role !== 'trainer' && (u.group || 1) === activeGroup.id);
  const allStates = getAllStates();
  const activities = getActivities();

  // Mission completion counts
  const missionNames = ['myth','whatis','jargon','caps','aiorhuman','safety','prompt','aitools','group','gallery','wish','speedround','final'];
  const missionTitles = [t('mythTitle'),t('whatisTitle'),t('jargonTitle'),t('capsTitle'),t('aiorhumanTitle'),t('safetyTitle'),t('promptTitle'),t('aitoolsTitle'),t('groupTitle'),t('galleryTitle'),t('wishTitle'),t('speedroundTitle'),t('finalTitle')];
  const missionCounts = missionNames.map(id => {
    return users.filter(u => {
      const s = allStates[u.id];
      return s && (s.completed || []).includes(id);
    }).length;
  });

function exportWishesCSV() {
  const activeGroup = getActiveGroup();
  const users = getUsers().filter(u => u.role !== 'trainer' && (u.group || 1) === activeGroup.id);
  const allStates = getAllStates();
  const rows = [];
  rows.push(['Name','Wish','Submitted At'].join(','));
  users.forEach(u => {
    const s = allStates[u.id];
    const wishes = s ? (s.wishes || []) : [];
    wishes.forEach(w => {
      const escaped = '"' + String(w).replace(/"/g, '""') + '"';
      rows.push([u.name, escaped, new Date().toISOString().slice(0,10)].join(','));
    });
  });
  const csv = '﻿' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `wishlist_${activeGroup ? activeGroup.name : 'group'}_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(t('exportSuccess'), 'success');
}

function timeAgo(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return t('timeAgoJustNow');
  if (mins < 60) return t('timeAgoMinutes', {n: mins});
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return t('timeAgoHours', {n: hrs});
  const days = Math.floor(hrs / 24);
  if (days < 7) return t('timeAgoDays', {n: days});
  return t('timeAgoWeeks', {n: Math.floor(days / 7)});
}

  const si = scoreMap[currentId];
  markComplete(currentId, si ? si[0]() : 0, si ? si[1] : 0);
  const pts = pointsMap[currentId] || 15;
  addPoints(pts, t('missionCompletePts'));
  playSound('complete');

  const badgeInfo = badgeMap[currentId];
  if (badgeInfo) {
    const cond = badgeInfo.condition ? badgeInfo.condition() : true;
    if (cond) awardBadge(badgeInfo.id, badgeInfo.title);
  }

  const nextId = getNextMissionId(currentId);
  if (nextId) {
    startMission(nextId);
  } else {
    goMissions();
  }
}

function nextMissionBtn(currentId) {
  const nextId = getNextMissionId(currentId);
  if (!nextId) return '';
  return `<button onclick="completeAndAdvance('${currentId}')" class="w-full py-2.5 bg-sky-500/10 border border-sky-500/30 text-sky-400 rounded-xl text-sm font-bold btn-pulse flex items-center justify-center gap-2">

  </button>`;
}

/* Personal Best Tracking */
function getPersonalBest(missionId) {
  if (!state.missionHistory) state.missionHistory = {};
  return state.missionHistory[missionId]?.bestScore || 0;
}
function updatePersonalBest(missionId, score, scoreMax) {
  if (!state.missionHistory) state.missionHistory = {};
  if (!state.missionHistory[missionId]) state.missionHistory[missionId] = {};
  const prev = state.missionHistory[missionId].bestScore || 0;
  if (score > prev) {
    state.missionHistory[missionId].bestScore = score;
    state.missionHistory[missionId].bestScoreMax = scoreMax;
    saveState();
    return true; // new best!
  }
  return false;
}

function dailyTip() {
  const tips = CURRENT_LANG === 'ar' ? DAILY_TIPS_AR : DAILY_TIPS;
  const idx = Math.floor(Math.random() * tips.length);
  return tips[idx];
}
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function getShuffledQuestion(index) {
  const q = D(QUIZ, QUIZ_AR)[index];
  const opts = q.options.map((text, origIdx) => ({ text, isCorrect: origIdx === q.a }));
  const shuffled = shuffleArray(opts);
  return {
    q: q.q,
    options: shuffled.map(o => o.text),
    a: shuffled.findIndex(o => o.isCorrect),
    explain: q.explain
  };
}

                    ${m.num ? `<span class="text-[10px] font-bold ${done?'text-emerald-400':'text-gray-500'} uppercase tracking-wider">${t('mission')} ${m.num}</span>` : ''}

                  </div>

                </button>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
  setView(html);
}

function getPrevMissionId(id) {
  const idx = MISSION_ORDER.indexOf(id);
  if (idx <= 0) return null;
  return MISSION_ORDER[idx - 1];
}

function isMissionLockedForUser(missionId) {
  if (!MISSION_ORDER.includes(missionId)) return true;
  if (missionId === 'myth') return false;
  const prevId = getPrevMissionId(missionId);
  const override = getEffectiveLock(missionId);
  if (override === 'unlocked') return false;
  if (override === 'locked') return true;
  return prevId ? !state.completed.has(prevId) : false;
}
function resetMission(id) {
  switch(id) {
    case 'myth': state.mythIndex = 0; state.mythScore = 0; break;
    case 'jargon': state.jargonIndex = 0; break;
    case 'aiorhuman': state.aiorhumanIndex = 0; state.aiorhumanScore = 0; break;
    case 'safety': state.safetyIndex = 0; state.safetyScore = 0; break;
    case 'prompt': state.promptBonusAwarded = false; break;
    case 'aitools': state.aitoolsIndex = 0; state.aitoolsVotes = []; break;
    case 'group': state.groupVoted = false; break;
    case 'final': state.quizIndex = 0; state.quizScore = 0; break;
  }
  saveState();
}
function startMission(id) {
  if (id === 'speedround' && !hasTrainerAccess()) {
    showToast(t('lockedBtn'), 'info'); return;
  }
  if (isMissionLockedForUser(id) && !state.completed.has(id)) {
    showToast(t('lockedBtn'), 'info'); return;
  }
  // If replaying a completed mission, reset its progress first
  if (state.completed.has(id)) resetMission(id);
  const map = {
    myth: renderMyth, whatis: renderWhatIs, jargon: renderJargon,
    caps: renderCapabilities, aiorhuman: renderAIorHuman,
    safety: renderSafety,
    prompt: renderPrompt, aitools: renderAITools, group: renderGroup,
    gallery: renderGallery,
    speedround: renderSpeedRound, wish: renderWish, final: renderFinal,
  };
  if (map[id]) map[id]();
}

/* ============================================================
   NEW: SPEED ROUND
   ============================================================ */
let speedTimer = null;
let speedTimeLeft = 60;
let speedScore = 0;
let speedQIndex = 0;
let speedTotal = 0;

function renderSpeedRound() {
  state.view = 'speedround';
  // Reset speed round state
  speedTimeLeft = 60;
  speedScore = 0;
  speedQIndex = 0;
  speedTotal = 0;

  setView(`${backBtn()}
    <div class="card-enter text-center">
      <h2 class="text-lg font-black text-white mb-1">${t('speedRoundHeader')}</h2>
      <p class="text-xs text-gray-400 mb-4">${t('speedRoundDesc')}</p>
      <div class="bg-field-800 border border-field-700 rounded-xl p-5 mb-4">
        <div class="text-5xl font-black text-field-accent mb-2" id="speedTimer">60</div>
        <p class="text-xs text-gray-400">${t('secondsRemaining')}</p>
      </div>
      <button onclick="startSpeedRound()" class="w-full py-4 bg-field-accent text-field-900 rounded-xl text-base font-black btn-pulse" id="speedStartBtn">
        <i class="fa-solid fa-bolt me-2"></i> Start
      </button>
      <div id="speedGame" class="hidden"></div>
      <div id="speedResult" class="hidden"></div>
    </div>
  `);
}

function startSpeedRound() {
  if (speedTimer) return; // prevent double-start
  document.getElementById('speedStartBtn').classList.add('hidden');
  document.getElementById('speedGame').classList.remove('hidden');
  speedTimeLeft = 60;
  speedScore = 0;
  speedQIndex = 0;
  speedTotal = 0;
  showSpeedQuestion();
  speedTimer = setInterval(() => {
    speedTimeLeft--;
    const el = document.getElementById('speedTimer');
    if (el) {
      el.textContent = speedTimeLeft;
      if (speedTimeLeft <= 10) el.style.color = '#ef4444';
    }
    if (speedTimeLeft <= 0) endSpeedRound();
  }, 1000);
}

function showSpeedQuestion() {
  if (speedTimeLeft <= 0) { endSpeedRound(); return; }
  // Pick a random question set (mix from QUIZ and SPEED_ROUND_QUESTIONS)
  const pool = [...D(QUIZ, QUIZ_AR), ...D(SPEED_ROUND_QUESTIONS, SPEED_ROUND_QUESTIONS_AR)];
  const q = pool[Math.floor(Math.random() * pool.length)];
  speedQIndex++;
  speedTotal++;
  // Shuffle options so correct answer is not always in the same slot
  const originalOpts = q.options || q.opts;
  const indexedOpts = originalOpts.map((text, i) => ({ text, originalIdx: i }));
  const shuffled = shuffleArray(indexedOpts);
  const correctIdx = shuffled.findIndex(item => item.originalIdx === q.a);
  const game = document.getElementById('speedGame');
  game.innerHTML = `
    <div class="bg-field-800 border border-field-700 rounded-xl p-4 mb-3">
      <p class="text-xs text-gray-400">${t('qPrefix')}${speedQIndex}</p>
      <p class="text-sm font-bold text-white leading-snug mt-1">${q.q}</p>
    </div>
    <div class="grid grid-cols-2 gap-2" id="speedOpts">
      ${shuffled.map((item, i) => `
        <button id="speedBtn-${i}" onclick="answerSpeed(${i}, ${correctIdx})" class="speed-btn py-3 px-2 rounded-xl bg-field-800 border border-field-700 text-[11px] font-semibold text-gray-300 hover:border-field-accent/50 hover:bg-field-accent/5 btn-pulse transition">${item.text}</button>
      `).join('')}
    </div>
  `;
}

function answerSpeed(choice, correctAnswer) {
  const correct = choice === correctAnswer;
  const optsDiv = document.getElementById('speedOpts');
  if (optsDiv) {
    // Disable all buttons
    optsDiv.querySelectorAll('button').forEach(btn => {
      btn.disabled = true;
      btn.classList.remove('btn-pulse', 'hover:border-field-accent/50', 'hover:bg-field-accent/5');
      btn.style.opacity = '0.6';
    });
    // Highlight clicked button
    const clicked = document.getElementById(`speedBtn-${choice}`);
    if (clicked) {
      clicked.style.opacity = '1';
      if (correct) {
        clicked.classList.add('border-emerald-500', 'bg-emerald-500/20', 'text-emerald-300');
        clicked.classList.remove('border-field-700', 'bg-field-800', 'text-gray-300');
      } else {
        clicked.classList.add('border-field-danger', 'bg-field-danger/20', 'text-field-danger');
        clicked.classList.remove('border-field-700', 'bg-field-800', 'text-gray-300');
        // Also highlight the correct answer
        const correctBtn = document.getElementById(`speedBtn-${correctAnswer}`);
        if (correctBtn) {
          correctBtn.style.opacity = '1';
          correctBtn.classList.add('border-emerald-500', 'bg-emerald-500/20', 'text-emerald-300');
          correctBtn.classList.remove('border-field-700', 'bg-field-800', 'text-gray-300');
        }
      }
    }
  }
  if (correct) {
    speedScore++;
    playSound('correct');
  } else {
    playSound('wrong');
  }
  // Brief pause so user sees the color before next question
  setTimeout(() => {
    if (speedTimeLeft > 0) {
      showSpeedQuestion();
    } else {
      endSpeedRound();
    }
  }, 700);
}

function endSpeedRound() {
  clearInterval(speedTimer);
  const game = document.getElementById('speedGame');
  const result = document.getElementById('speedResult');
  if (game) game.classList.add('hidden');
  if (result) result.classList.remove('hidden');

  const passed = speedScore >= 5;
  const msg = speedScore >= 15 ? t('legendary') :
              speedScore >= 10 ? t('impressive') :
              speedScore >= 5 ? t('solid') :
              speedScore >= 3 ? t('gettingThere') : t('rookie');

  result.innerHTML = `
    <div class="bg-field-800 border border-field-700 rounded-xl p-5 card-enter">
      <div class="text-5xl mb-3">⚡</div>
      <h3 class="text-lg font-black text-white">${t('timesUp')}</h3>
      <div class="text-3xl font-black text-field-accent my-2">${speedScore}</div>
      <p class="text-xs text-gray-400">${t('correctIn60')}</p>
      <p class="text-xs text-field-accent mt-2 font-semibold">${msg}</p>
      ${speedScore > getPersonalBest('speedround') ? `<p class="text-xs text-emerald-400 mt-1 font-bold">${t('newPersonalBest')}</p>` : ''}
      ${takeawaysHTML('speedround')}
      ${nextMissionBtn('speedround')}
      <button onclick="renderSpeedRound()" class="mt-3 w-full py-2.5 bg-field-700 text-white rounded-lg text-sm font-bold btn-pulse">${t('playAgain')}</button>
      <button onclick="recordMissionScore('speedround', speedScore, speedTotal); markComplete('speedround'); addPoints(speedScore*2, t('speedRoundPts')); goMissions();" class="mt-2 w-full py-3 bg-field-accent text-field-900 rounded-xl text-sm font-black btn-pulse">${t('completeMission')}</button>
    </div>
  `;
  // Record score and update personal best
  if (speedScore > 0) {
    recordMissionScore('speedround', speedScore, speedTotal);
    updatePersonalBest('speedround', speedScore, speedTotal);
  }
}

/* ============================================================
   13. FINAL QUIZ
   ============================================================ */
function renderFinal() {
  state.view = 'final';
  if (state.quizIndex >= D(QUIZ, QUIZ_AR).length) {
    const passed = state.quizScore >= QUIZ_PASSING_SCORE;
    setView(`${backBtn()}
      <div class="text-center py-6 card-enter">
        <div class="w-16 h-16 rounded-full ${passed?'bg-emerald-500/15 text-emerald-400':'bg-field-danger/15 text-field-danger'} flex items-center justify-center mx-auto mb-3 text-2xl">
          <i class="fa-solid ${passed?'fa-trophy':'fa-circle-xmark'}"></i>
        </div>
        <h2 class="text-lg font-black text-white">${passed?t('passed'):t('notYet')}</h2>
        <p class="text-sm text-gray-400 mt-1">${t('score')}: <span dir="ltr">${state.quizScore}/${D(QUIZ, QUIZ_AR).length}</span></p>
        <p class="text-xs ${passed?'text-emerald-400':'text-field-danger'} mt-1 font-semibold">${passed?t('workshopComplete'):t('needMore')}</p>
        ${passed ? '' : `
          <button onclick="state.quizIndex=0; state.quizScore=0; saveState(); renderFinal();" class="mt-4 w-full py-3 bg-field-accent text-field-900 rounded-xl text-sm font-black btn-pulse">${t('retryQuiz')}</button>
        `}
        ${passed ? `<button onclick="markComplete('final'); awardBadge('graduate', t('fieldAIGraduateTitle')); addPoints(50, t('workshopComplete')); goMissions();" class="mt-4 w-full py-3 bg-field-accent text-field-900 rounded-xl text-sm font-black btn-pulse">${t('completeMission')}</button>` : `<button onclick="goMissions()" class="mt-4 w-full py-3 bg-field-700 text-white rounded-xl text-sm font-bold btn-pulse">${t('backToHub')}</button>`}
      </div>
    `);
    return;
  }
  state.currentQuizQ = getShuffledQuestion(state.quizIndex);
  const q = state.currentQuizQ;
  setView(`${backBtn()}
    <div class="card-enter">
      <div class="flex items-center gap-2 mb-3">
        <span class="text-xs font-bold text-field-accent bg-field-accent/10 px-2 py-1 rounded">${t('question')} <span dir="ltr">${state.quizIndex+1}/${D(QUIZ, QUIZ_AR).length}</span></span>
        <span class="text-xs text-gray-400">${t('score')}: ${state.quizScore}</span>
      </div>
      <div class="bg-field-800 border border-field-700 rounded-xl p-4 mb-4">
        <p class="text-sm font-bold text-white leading-snug">${q.q}</p>
      </div>
      <div class="grid gap-2.5" id="quizBtns">
        ${q.options.map((opt, i) => `
          <button onclick="answerQuiz(${i})" class="text-left px-4 py-3 rounded-xl bg-field-800 border border-field-700 text-xs font-semibold text-gray-300 hover:border-field-accent/50 hover:bg-field-accent/5 btn-pulse transition choice-glow">${i+1}. ${opt}</button>
        `).join('')}
      </div>
      <div id="quizFeedback" class="mt-4 hidden"></div>
    </div>
  `);
}
function answerQuiz(choice) {
  const btns = document.getElementById('quizBtns');
  if (btns) btns.style.display = 'none';
  const q = state.currentQuizQ;
  if (!q) { renderFinal(); return; }
  const correct = choice === q.a;
  playSound(correct ? 'correct' : 'wrong');
  if (correct) { state.quizScore++; addPoints(10, t('correctQuiz')); }
  const fb = document.getElementById('quizFeedback');
  fb.classList.remove('hidden');
  fb.className = 'card-enter rounded-xl border p-3 ' + (correct ? 'bg-emerald-500/10 border-emerald-500/30' : 'bg-field-danger/10 border-field-danger/30');
  fb.innerHTML = `
    <div class="flex items-center gap-2 mb-1">
      <i class="fa-solid ${correct?'fa-circle-check text-emerald-400':'fa-circle-xmark text-field-danger'} text-lg"></i>
      <span class="font-bold text-sm ${correct?'text-emerald-400':'text-field-danger'}">${correct?t('correct'):t('wrong')}</span>
    </div>
    <p class="text-xs text-gray-300 leading-relaxed">${q.explain}</p>
    <button onclick="nextQuiz()" class="mt-3 w-full py-2.5 bg-field-accent text-field-900 rounded-lg text-sm font-black btn-pulse">${state.quizIndex+1 >= D(QUIZ, QUIZ_AR).length ? t('seeResults') : t('nextQuestion')} <i class="fa-solid fa-arrow-right ms-1"></i></button>
  `;
  saveState();
}
function nextQuiz() {
  if (state._navLock) return;
  state._navLock = true;
  state.quizIndex++;
  saveState();
  renderFinal();
  setTimeout(() => state._navLock = false, 400);
}


/* ============================================================
   ${t('badLabel')}GES MODAL
   ============================================================ */
function renderBadgesModal() {
  const allBadges = [
    { id: 'mythbuster', title: t('mythBusterTitle'), icon: 'fa-fire', desc: t('mythBusterDesc'), condition: () => state.mythScore >= 6 },
    { id: 'jargonmaster', title: t('jargonMasterTitle'), icon: 'fa-book-open', desc: t('jargonBusterDesc'), condition: () => state.badges.has('jargonmaster') },
    { id: 'aidetective', title: t('aiDetectiveTitle'), icon: 'fa-user-secret', desc: t('aiDetectiveDesc'), condition: () => state.aiorhumanScore >= 4 },
    { id: 'prompteng', title: t('promptEngineerTitle'), icon: 'fa-terminal', desc: t('promptengDesc'), condition: () => state.badges.has('prompteng') },
    { id: 'safetyexpert', title: t('safetyExpertTitle'), icon: 'fa-shield-halved', desc: t('safetyExpertDesc'), condition: () => state.safetyScore >= 4 },
    { id: 'fieldai', title: t('fieldAIOperatorTitle'), icon: 'fa-toolbox', desc: t('fieldAIOperatorDesc'), condition: () => state.badges.has('fieldai') },
    { id: 'graduate', title: t('fieldAIGraduateTitle'), icon: 'fa-graduation-cap', desc: t('fieldAIGraduateDesc'), condition: () => state.badges.has('graduate') },
  ];
  const unlocked = allBadges.filter(b => b.condition());
  const locked = allBadges.filter(b => !b.condition());

  const html = `
    ${backBtn()}
    <div class="card-enter">
      <h2 class="text-lg font-black text-white mb-3">${t('awardsTitle')}</h2>
      <div class="grid gap-2.5 mb-4">
        ${unlocked.map(b => `
          <div class="bg-field-800 border border-field-accent/40 rounded-xl p-3 flex items-center gap-3 badge-glow">
            <div class="w-10 h-10 rounded-full bg-field-accent/15 text-field-accent flex items-center justify-center text-lg"><i class="fa-solid ${b.icon}"></i></div>
            <div>
              <h4 class="text-sm font-bold text-white">${b.title}</h4>
              <p class="text-[11px] text-gray-400">${b.desc}</p>
            </div>
          </div>
        `).join('')}
        ${locked.map(b => `
          <div class="bg-field-800/60 border border-field-700 rounded-xl p-3 flex items-center gap-3 opacity-60">
            <div class="w-10 h-10 rounded-full bg-field-700 text-gray-500 flex items-center justify-center text-lg"><i class="fa-solid ${b.icon}"></i></div>
            <div>
              <h4 class="text-sm font-bold text-gray-500">${b.title}</h4>
              <p class="text-[11px] text-gray-600">${b.desc}</p>
            </div>
          </div>
        `).join('')}
      </div>
      <button onclick="goMissions()" class="w-full py-3 bg-field-700 text-white rounded-xl text-sm font-bold btn-pulse">${t('close')}</button>
    </div>
  `;
  setView(html);
}
